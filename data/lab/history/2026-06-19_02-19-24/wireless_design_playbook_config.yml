- feature_template_config:
  - rrm_fra_configuration:
    - design_name: Default FRA 2.4-5GHz Design
      feature_attributes:
        radio_band: 2_4GHZ_5GHZ
        fra_freeze: false
        fra_status: true
        fra_interval: 1
        fra_sensitivity: MEDIUM
      unlocked_attributes:
      - fra_freeze
      - fra_status
      - fra_interval
      - fra_sensitivity
    - design_name: Default FRA 5-6GHz Design
      feature_attributes:
        radio_band: 5GHZ_6GHZ
        fra_freeze: false
        fra_status: true
        fra_interval: 1
      unlocked_attributes:
      - fra_freeze
      - fra_status
      - fra_interval
      - fra_sensitivity
  - flexconnect_configuration:
    - design_name: Default Flex Configuration
      feature_attributes:
        overlap_ip_enable: false
      unlocked_attributes:
      - overlap_ip_enable
  - rrm_general_configuration:
    - design_name: Default RRM General 5GHz Design
      feature_attributes:
        radio_band: 5GHZ
        monitoring_channels: MONITORING_CHANNELS_COUNTRY
        neighbor_discover_type: NEIGHBOR_DISCOVER_TYPE_TRANSPARENT
        throughput_threshold: 1000000
        coverage_hole_detection: true
      unlocked_attributes:
      - monitoring_channels
      - neighbor_discover_type
      - throughput_threshold
      - coverage_hole_detection
    - design_name: Default RRM General 2.4GHz Design
      feature_attributes:
        radio_band: 2_4GHZ
        monitoring_channels: MONITORING_CHANNELS_COUNTRY
        neighbor_discover_type: NEIGHBOR_DISCOVER_TYPE_TRANSPARENT
        throughput_threshold: 1000000
        coverage_hole_detection: true
      unlocked_attributes:
      - monitoring_channels
      - neighbor_discover_type
      - throughput_threshold
      - coverage_hole_detection
    - design_name: Default RRM General 6GHz Design
      feature_attributes:
        radio_band: 6GHZ
        monitoring_channels: MONITORING_CHANNELS_COUNTRY
        neighbor_discover_type: NEIGHBOR_DISCOVER_TYPE_TRANSPARENT
        throughput_threshold: 1000000
        coverage_hole_detection: true
      unlocked_attributes:
      - monitoring_channels
      - neighbor_discover_type
      - throughput_threshold
      - coverage_hole_detection
  - dot11be_configuration:
    - design_name: Default 802.11be Status 5GHz Design
      feature_attributes:
        dot11be_status: false
        radio_band: 5GHZ
      unlocked_attributes:
      - dot11be_status
    - design_name: wifi7_6g
      feature_attributes:
        dot11be_status: true
        radio_band: 6GHZ
    - design_name: Default 802.11be Status 6GHz Design
      feature_attributes:
        dot11be_status: false
        radio_band: 6GHZ
      unlocked_attributes:
      - dot11be_status
    - design_name: Default 802.11be Status 2.4GHz Design
      feature_attributes:
        dot11be_status: false
        radio_band: 2_4GHZ
      unlocked_attributes:
      - dot11be_status
  - dot11ax_configuration:
    - design_name: Default Dot11ax 802.11a Design
      feature_attributes:
        radio_band: 5GHZ
        bss_color: true
        non_srg_obss_pd_max_threshold: -62
        target_wakeup_time_11ax: true
        obss_pd: false
      unlocked_attributes:
      - target_wakeup_time_11ax
      - obss_pd
      - bss_color
      - target_waketime_broadcast
      - non_srg_obss_pd_max_threshold
