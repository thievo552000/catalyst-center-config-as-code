- configuration_templates:
    template_name: Add SXP Peerings on a BN v21.2.1
    project_name: Citi Jinja v21.2.1
    language: JINJA
    composite: false
    software_type: IOS-XE
    custom_params_order: true
    device_types:
    - product_family: Switches and Hubs
    template_content: "{% raw %}! IP Addresses updated to the appropriate SXP reflector\
      \ IPs\n! These variables are hidden in Jinja while working in Velocity: \n!\
      \ {{ATM_SRC_IP}}\n! {{ATM_VN}}\n! This workaround shows them.\n!\n{% set SXP_REFLECTORS_CORP\
      \ = [\"1.1.1.1\",\"2.2.2.2\"] %}\n{% set SXP_REFLECTORS_IOT = [\"1.1.1.1\",\"\
      2.2.2.2\"] %}\n{% set SXP_REFLECTORS_ATM = [\"1.1.1.1\",\"2.2.2.2\"] %}\n!\n\
      {% if REGION == \"NAM\" %}\n{% set SXP_REFLECTORS_CORP = [\"1.1.1.1\",\"2.2.2.2\"\
      ] %}\n{% set SXP_REFLECTORS_IOT = [\"1.1.1.1\",\"2.2.2.2\"] %}\n{% if IOT_SITE_B\
      \ == \"Yes\" %}\n{% set SXP_REFLECTORS_IOT = [\"1.1.1.1\",\"2.2.2.2\"] %}\n\
      {% endif %}\n{% set SXP_REFLECTORS_ATM = [\"1.1.1.1\",\"2.2.2.2\"] %}\n{% endif\
      \ %}\n{% if REGION == \"LATAM\" %}\n{% set SXP_REFLECTORS_CORP = [\"1.1.1.1\"\
      ,\"2.2.2.2\"] %}\n{% set SXP_REFLECTORS_IOT = [\"1.1.1.1\",\"2.2.2.2\"] %}\n\
      {% if IOT_SITE_B == \"Yes\" %}\n{% set SXP_REFLECTORS_IOT = [\"1.1.1.1\",\"\
      2.2.2.2\"] %}\n{% endif %}\n{% set SXP_REFLECTORS_ATM = [\"1.1.1.1\",\"2.2.2.2\"\
      ] %}\n{% endif %}\n{% if REGION == \"EMEA\" %}\n{% set SXP_REFLECTORS_CORP =\
      \ [\"1.1.1.1\",\"2.2.2.2\"] %}\n{% set SXP_REFLECTORS_IOT = [\"1.1.1.1\",\"\
      2.2.2.2\"] %}\n{% if IOT_SITE_B == \"Yes\" %}\n{% set SXP_REFLECTORS_IOT = [\"\
      1.1.1.1\",\"2.2.2.2\"] %}\n{% endif %}\n{% set SXP_REFLECTORS_ATM = [\"1.1.1.1\"\
      ,\"2.2.2.2\"] %}\n{% endif %}\n{% if REGION == \"MEX\" %}\n{% set SXP_REFLECTORS_CORP\
      \ = [\"1.1.1.1\",\"2.2.2.2\"] %}\n{% set SXP_REFLECTORS_IOT = [\"1.1.1.1\",\"\
      2.2.2.2\"] %}\n{% if IOT_SITE_B == \"Yes\" %}\n{% set SXP_REFLECTORS_IOT = [\"\
      1.1.1.1\",\"2.2.2.2\"] %}\n{% endif %}\n{% set SXP_REFLECTORS_ATM = [\"1.1.1.1\"\
      ,\"2.2.2.2\"] %}\n{% endif %}\n{% if REGION == \"ASPAC\" %}\n{% set SXP_REFLECTORS_CORP\
      \ = [\"1.1.1.1\",\"2.2.2.2\"] %}\n{% set SXP_REFLECTORS_IOT = [\"1.1.1.1\",\"\
      2.2.2.2\"] %}\n{% if IOT_SITE_B == \"Yes\" %}\n{% set SXP_REFLECTORS_IOT = [\"\
      1.1.1.1\",\"2.2.2.2\"] %}\n{% endif %}\n{% set SXP_REFLECTORS_ATM = [\"1.1.1.1\"\
      ,\"2.2.2.2\"] %}\n{% endif %}\n! Using SXP Reflector IPs for: {{REGION}}\n!\n\
      cts sxp enable\ncts sxp default password {{SXP_PASSWORD}}\n{% for SXP_IP in\
      \ SXP_REFLECTORS_CORP %}\ncts sxp connection peer {{SXP_IP}} source {{CORP_SRC_IP}}\
      \ password default mode local listener vrf {{CORP_VN}}\n{% endfor %}\n!\n{%\
      \ if HAS_IOT == \"Yes\" %}\n{% for SXP_IP in SXP_REFLECTORS_IOT %}\ncts sxp\
      \ connection peer {{SXP_IP}} source {{IOT_SRC_IP}} password default mode local\
      \ listener vrf {{IOT_VN}}\n{% endfor %}\n{% endif %}\n!\n{% if HAS_ATM == \"\
      Yes\" %}\n{% for SXP_IP in SXP_REFLECTOR_ATM %}\ncts sxp connection peer {{SXP_IP}}\
      \ source {{ATM_SRC_IP}} password default mode local listener vrf {{ATM_VN}}\n\
      {% endfor %}\n{% endif %}\n{% endraw %}"
