- configuration_templates:
    template_name: Banner_Privilege_GL
    template_description: Template for General Global commands, Banner & Privilege
      Configuration for all 9K Switches Branches
    project_name: RBC_Template_Blocks
    author: admin
    language: VELOCITY
    composite: false
    software_type: IOS-XE
    custom_params_order: false
    device_types:
    - product_family: Switches and Hubs
    template_content: "#if($GLOBAL_COMMANDS == true)\n! GLOBAL_COMMANDS_Section\n\n\
      clock timezone UTC 0\nservice timestamps debug datetime msec localtime show-timezone\
      \ year\nservice timestamps log datetime msec localtime show-timezone year\n\
      logging buffered 128000\nservice password-encryption\nservice sequence-numbers\n\
      no service pad\nlogging console critical\nno ip source-route\nno ip gratuitous-arps\n\
      no ip bootp server\nno ip domain lookup\nlldp run\ncdp run\nno service dhcp\n\
      ip domain name rns.fg.rbc.com\nno ip http server\nno ip http secure-server\n\
      ip ssh time-out 60\nip arp inspection log-buffer entries 512\nip arp inspection\
      \ log-buffer logs 512 interval 15\nip scp server enable\nfile verify auto\n\
      file privilege 8\nno service config\nno service udp-small-servers\nno service\
      \ tcp-small-servers\nservice tcp-keepalives-in\nservice tcp-keepalives-out\n\
      no ip finger\nno ip rcmd rsh-enable\nno ip rcmd rcp-enable\nvtp mode transparent\n\
      vtp domain BRANCH\nspanning-tree mode rapid-pvst\nmemory free low-watermark\
      \ processor 260000\ndot1x system-auth-control\nmac address-table notification\
      \ mac-move\n\ninterface GigabitEthernet0/0\n shutdown\n\ninterface Vlan1\n no\
      \ ip address\n shutdown\n\n#end\n\n#if ($BANNER == true)\n! BANNER_Section\n\
      <MLTCMD> banner login ~\nAUTHENTICATION SERVICE\n~</MLTCMD>\n<MLTCMD> banner\
      \ motd ~\n+-----------------------------------------------------------------------+\n\
      |                               WARNING                                 |\n\
      |                               -------                                 |\n\
      | The confidential programs and data on this system are either licensed |\n\
      | to or owned by the company (the \"Company\") operating this system, or  |\n\
      | its affiliates. This is a private system, intended to be accessed and |\n\
      | used only by the Company's authorized users. Any other access to or   |\n\
      | use of this system is unlawful and strictly prohibited. This system   |\n\
      | may be monitored at any time for operational reasons. If you are not  |\n\
      | a user authorized by the Company to access this system, you must      |\n\
      | DISCONNECT IMMEDIATELY. DO NOT ATTEMPT TO LOG IN.                     |\n\
      +-----------------------------------------------------------------------+\n\
      ~</MLTCMD>\n\n#end\n\n#if ($PRIVILEGE_LEVEL_COMMANDS == true)\n! PRIVILEGE_Section\n\
      \nprivilege exec level 1 traceroute\nprivilege exec level 1 ping\nprivilege\
      \ exec level 1 send\nprivilege exec level 8 terminal monitor\nprivilege exec\
      \ level 8 terminal\nprivilege exec level 8 show mab all summary\nprivilege exec\
      \ level 8 show mab all\nprivilege exec level 8 show mab\nprivilege exec level\
      \ 8 show authentication sessions\nprivilege exec level 8 show authentication\n\
      privilege exec level 8 show dot1x all summary\nprivilege exec level 8 show dot1x\
      \ all\nprivilege exec level 8 show dot1x\nprivilege exec all level 8 show crypto\n\
      privilege exec level 8 show running-config view full\nprivilege exec level 8\
      \ show running-config view\nprivilege exec level 8 show running-config\nprivilege\
      \ exec level 8 show configuration\nprivilege exec level 8 show startup-config\n\
      privilege exec level 8 show logging\nprivilege exec level 8 show\nprivilege\
      \ exec level 8 clear line\nprivilege exec level 1 clear counters\nprivilege\
      \ exec level 1 clear\nalias exec run show running-config view full\n\n#end"
    template_tag:
    - id: 3e212ee5-6405-40a7-be64-56e4d6cefdea
      name: Brownfield
