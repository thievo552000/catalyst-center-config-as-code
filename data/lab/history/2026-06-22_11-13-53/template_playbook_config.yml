- configuration_templates:
    template_name: InterfacesGF_basic_GU_GL
    project_name: Templates Global
    language: JINJA
    composite: false
    software_type: IOS-XE
    custom_params_order: false
    device_types:
    - product_family: Switches and Hubs
    template_content: "{% raw %}{# Macros are located in the folder -> the_macro_library\
      \ #}\n{% include \"The_Macro_Library/Macro: NAC\" %}\n{% include \"The_Macro_Library/Macro:\
      \ Interface Configs\" %}\n{% include \"The_Macro_Library/Macro: L3_Vlans\" %}\n\
      !\ninterface Loopback0\ndescription {{Hostname}} Mgmt interface\nexit\n!\nvtp\
      \ domain campus\n!\nspanning-tree portfast bpduguard default\nspanning-tree\
      \ extend system-id\nspanning-tree uplinkfast\nspanning-tree backbonefast\ndiagnostic\
      \ bootup level complete\nqos queue-softmax-multiplier 1200\nudld enable\n!\n\
      {#{% if basic_services == 'true' %}#}\n{{basic_services()}}\n{#{% endif %}#}\n\
      \n{% if Region == 'CANADA' %}\n! Canadian Multicast Config\n{{multicast()}}\n\
      {% else %}\n! No Multicast Config\n{% endif%}\n\n{% if ADD_NAC_CONFIG != true\
      \ %}\n! No Global NAC Config required\n\n{% elif Region == 'CANADA' %}\n{{nac_CAN()}}\n\
      \n{% elif Region == 'US' or Region == 'CARIBBEAN' %}\n{{nac_US_CAR()}}\n\n{%\
      \ endif %}\n\n! User Ports Basic Config including NAC\n{% for interface in __interface\
      \ %}\n {% if interface.interfaceType == 'Physical' and interface.portMode !=\
      \ 'routed' and interface.portMode != 'trunk' %}\n {% set port_name = interface.portName.replaceAll(\"\
      ^([TGF][a-zA-Z]+).*\",\"$1\") %}\n {% set port_card = interface.portName.replaceAll(\"\
      ^[TGF][a-zA-Z]+(\\\\d+)/(\\\\d+)/(\\\\d+)\", \"$1\") %}\n {% set fixed_ports\
      \ = interface.portName.replaceAll(\"^[TGF][a-zA-Z]+(\\\\d+)/(\\\\d+)/(\\\\d+)\"\
      , \"$2\") %}\n {% set port_number = interface.portName.replaceAll(\"^[TGF][a-zA-Z]+(\\\
      \\d+)/(\\\\d+)/(\\\\d+)\", \"$3\") %}\n\n  {% if 'C9300' in __device.platformId\
      \ %}\n   {% if port_name != interface.portName and fixed_ports == 0 %}\ninterface\
      \ {{interface.portName}}\n{{GU_User_Port()}}\n{{interface_NAC()}}\n   {% endif\
      \ %}\n  {% elif 'C9407' in __device.platformId %}\n   {% if port_name != interface.portName\
      \ and port_card != 3 and port_card != 4 %}\ninterface {{interface.portName}}\n\
      {{GU_User_Port()}}\n{{interface_NAC()}}\n   {% endif %}\n  {% elif 'C9410' in\
      \ __device.platformId %}\n   {% if port_name != interface.portName and port_card\
      \ != 5 and port_card != 6 %}\ninterface {{interface.portName}}\n{{GU_User_Port()}}\n\
      {{interface_NAC()}}\n   {% endif %}\n  {% endif %}\n {% endif %}\n{% endfor\
      \ %}\n\n\n{% if wifi_ports == 'true' %}\n! Wifi Ports\n\n{% if 'C9300' in __device.platformId\
      \ %}\n{% set sw_num = __device.platformId.split(\",\") | length %}\n{% if sw_num\
      \ == 1 %}\n{% set ap_port_range = '1/41-1/48' %}\n! AP Port Range {{ ap_port_range\
      \ }}\n{% else %}\n{% set ap_port_range = '1/41-2/48' %}\n! AP Port Range {{\
      \ ap_port_range }}\n{% endif %}\n{% elif 'C9407' in __device.platformId or 'C9410'\
      \ in __device.platformId %}\n{% set ap_port_range = '1/37-2/48' %}\n! AP Port\
      \ Range {{ ap_port_range }}\n{% else %}\n! Platform is not CAT 9K\n{% endif\
      \ %}\n{% set lc_from = ap_port_range.replaceAll(\"^([\\\\d]+)/([\\\\d]+)-([\\\
      \\d]+)/([\\\\d]+)\",\"$1\") | int %}\n{% set pc_from = ap_port_range.replaceAll(\"\
      ^([\\\\d]+)/([\\\\d]+)-([\\\\d]+)/([\\\\d]+)\",\"$2\") | int %}\n{% set lc_to\
      \ = ap_port_range.replaceAll(\"^([\\\\d]+)/([\\\\d]+)-([\\\\d]+)/([\\\\d]+)\"\
      ,\"$3\") | int %}\n{% set pc_to = ap_port_range.replaceAll(\"^([\\\\d]+)/([\\\
      \\d]+)-([\\\\d]+)/([\\\\d]+)\",\"$4\") | int %}\n{% set lc_to = lc_to + 1 %}\n\
      {% set pc_to = pc_to + 1 %}\n\n{% for interface in __interface %}\n {% if interface.interfaceType\
      \ == 'Physical' and interface.portMode != 'routed' and interface.portMode !=\
      \ 'trunk' %}\n {% set port_name = interface.portName.replaceAll(\"^([TGF][a-zA-Z]+).*\"\
      ,\"$1\") %}\n {% set port_card = interface.portName.replaceAll(\"^[TGF][a-zA-Z]+(\\\
      \\d+)/(\\\\d+)/(\\\\d+)\", \"$1\") %}\n {% set port_number = interface.portName.replaceAll(\"\
      ^[TGF][a-zA-Z]+(\\\\d+)/(\\\\d+)/(\\\\d+)\", \"$3\") %}\n  {% if port_name !=\
      \ interface.portName %}\n   {% for lc in range(lc_from, lc_to) %}\n    {% for\
      \ pc in range (pc_from, pc_to) %}\n     {% if lc == port_card && pc == port_number\
      \ %}\n! AP port\ndefault interface {{ interface.portName }}\ninterface {{ interface.portName\
      \ }}\n{{ GU_ap_port() }}\n! end AP port\n     {% endif %}\n    {% endfor %}\n\
      \   {% endfor %}\n  {% endif %}\n {% endif %}\n{% endfor %}\n{% endif %}{% endraw\
      \ %}"
