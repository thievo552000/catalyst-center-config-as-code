- configuration_templates:
    template_name: SDA BN VPNV4
    project_name: Citi Jinja v21.2.1
    language: JINJA
    composite: false
    software_type: IOS-XE
    custom_params_order: true
    device_types:
    - product_family: Switches and Hubs
    template_content: "{% raw %}!\n{% if HAS_CORPORATE == \"Yes\" %}\nvlan {{CORPORATE_VLAN}}\n\
      \ name CORP_BN_P2P\n!\ninterface {{CORPORATE_VLAN}}\n vrf forwarding {{CORPORATE_VN}}\n\
      \ ip address {{MY_IP}} 255.255.255.254\n no shutdown\n!\ninterface {{P2P_INTERFACE}}\n\
      \ switchport trunk allowed vlan add {{CORPORATE_VN}}\n!\n{% endif %}\n{% if\
      \ HAS_IOT == \"Yes\" %}\nvlan {{IOT_VLAN}}\n name IOT_BN_P2P\n!\ninterface {{IOT_VLAN}}\n\
      \ vrf forwarding {{IOT_VN}}\n ip address {{MY_IP}} 255.255.255.254\n no shutdown\n\
      !\ninterface {{P2P_INTERFACE}}\n switchport trunk allowed vlan add {{IOT_VN}}\n\
      !\n{% endif %}\n{% if HAS_ATM == \"Yes\" %}\nvlan {{ATM_VLAN}}\n name ATM_BN_P2P\n\
      !\ninterface {{ATM_VLAN}}\n vrf forwarding {{ATM_VN}}\n ip address {{MY_IP}}\
      \ 255.255.255.254\n no shutdown\n!\ninterface {{P2P_INTERFACE}}\n switchport\
      \ trunk allowed vlan add {{ATM_VN}}\n!\n{% endif %}\n{% if HAS_AV == \"Yes\"\
      \ %}\nvlan {{AV_VLAN}}\n name AV_BN_P2P\n!\ninterface {{AV_VLAN}}\n vrf forwarding\
      \ {{AV_VN}}\n ip address {{MY_IP}} 255.255.255.254\n no shutdown\n!\ninterface\
      \ {{P2P_INTERFACE}}\n switchport trunk allowed vlan add {{AV_VN}}\n!\n{% endif\
      \ %}\n{% if HAS_GRE_VPN0 == \"Yes\" %}\nvlan {{GRE_VPN0_VLAN}}\n name VPN0_GRE_BN_P2P\n\
      !\ninterface {{GRE_VPN0_VLAN}}\n vrf forwarding {{GRE_VPN0_VN}}\n ip address\
      \ {{MY_IP}} 255.255.255.254\n no shutdown\n!\ninterface {{P2P_INTERFACE}}\n\
      \ switchport trunk allowed vlan add {{GRE_VPN0_VN}}\n!\n{% endif %}\n{% if HAS_TLOC_VPN0\
      \ == \"Yes\" %}\nvlan {{TLOC_VPN0_VLAN}}\n name VPN0_TLOC_BN_P2P\n!\ninterface\
      \ {{TLOC_VPN0_VLAN}}\n vrf forwarding {{TLOC_VPN0_VN}}\n ip address {{MY_IP}}\
      \ 255.255.255.254\n no shutdown\n!\ninterface {{P2P_INTERFACE}}\n switchport\
      \ trunk allowed vlan add {{TLOC_VPN0_VN}}\n!\n{% endif %}\n!\n!\nrouter bgp\
      \ {{BGP_ASN}}\n{% if HAS_CORPORATE == \"Yes\" %}\n address-family ipv4 vrf {{CORPORATE_VN}}\n\
      \  neighbor {{PEER_IP}} remote-as {{BGP_ASN}}\n  neighbor {{PEER_IP}} update-source\
      \ vlan{{CORPORATE_VLAN}}\n  neighbor {{PEER_IP}} next-hop-self\n{% endif %}\n\
      {% if HAS_IOT == \"Yes\" %}\n address-family ipv4 vrf {{IOT_VN}}\n  neighbor\
      \ {{PEER_IP}} remote-as {{BGP_ASN}}\n  neighbor {{PEER_IP}} update-source vlan{{IOT_VLAN}}\n\
      \  neighbor {{PEER_IP}} next-hop-self\n{% endif %}\n{% if HAS_ATM == \"Yes\"\
      \ %}\n address-family ipv4 vrf {{ATM_VN}}\n  neighbor {{PEER_IP}} remote-as\
      \ {{BGP_ASN}}\n  neighbor {{PEER_IP}} update-source vlan{{ATM_VLAN}}\n  neighbor\
      \ {{PEER_IP}} next-hop-self\n{% endif %}\n{% if HAS_AV == \"Yes\" %}\n address-family\
      \ ipv4 vrf {{AV_VN}}\n  neighbor {{PEER_IP}} remote-as {{BGP_ASN}}\n  neighbor\
      \ {{PEER_IP}} update-source vlan{{AV_VLAN}}\n  neighbor {{PEER_IP}} next-hop-self\n\
      {% endif %}\n{% if HAS_GRE_VPN0 == \"Yes\" %}\n address-family ipv4 vrf {{GRE_VPN0_VN}}\n\
      \  neighbor {{PEER_IP}} remote-as {{BGP_ASN}}\n  neighbor {{PEER_IP}} update-source\
      \ vlan{{GRE_VPN0_VLAN}}\n  neighbor {{PEER_IP}} next-hop-self\n{% endif %}\n\
      {% if HAS_TLOC_VPN0 == \"Yes\" %}\n address-family ipv4 vrf {{TLOC_VPN0_VN}}\n\
      \  neighbor {{PEER_IP}} remote-as {{BGP_ASN}}\n  neighbor {{PEER_IP}} update-source\
      \ vlan{{TLOC_VPN0_VLAN}}\n  neighbor {{PEER_IP}} next-hop-self\n{% endif %}\n\
      !\n! Ensure remote LISP speakers are reachable in the underlay\n!\n{% SET COUNTER\
      \ = 5 %}\n{% for PFX in PFXS.split(\";\") %}\nip prefix-list PL_REMOTE_LISP_SPEAKERS\
      \ seq {{COUNTER}} permit {{PFX}}\n{% SET COUNTER = COUNTER + 5 %}\n{% endfor\
      \ %}\n!\nroute-map RM_REMOTE_LISP_SPEAKERS permit 10\n match ip address prefix-list\
      \ PL_REMOTE_LISP_SPEAKERS\n!\nroute-map RM_REMOTE_LISP_SPEAKERS deny 20\n!\n\
      router ospf {{OSPF_PROCESS_ID}}\n redistribute bgp {{BGP_ASN}} route-map RM_REMOTE_LISP_SPEAKERS\n\
      !\nroute-map RM-SET-COMMUNITIES permit 10\n set community 500:6 510:{{REMS_CODE}}\
      \ additive\n!\n{% endraw %}"
- configuration_templates:
    template_name: Secondary Guest Border Node
    project_name: Citi Jinja v21.2.1
    language: JINJA
    composite: false
    software_type: IOS-XE
    custom_params_order: true
    device_types:
    - product_family: Switches and Hubs
    - product_family: Routers
    template_content: "{% raw %}!\n!\n! Configures an SDA Control Plane node that\
      \ is the secondary Guest Border Node\n! With the required routing configuration\n\
      ! The router lisp section of the primary node should be copied into this device\
      \ \n! After provisioning SDA\n!\n!\n! Handle Jinja workaround\n! {{Primary_Loopback0}}\
      \ \n! {{ IS_SWITCH }}\n! {{ INTERFACES }}\n! {{ HAS_GUEST }}\n! {{GUEST_LOOPBACK_ID}}\n\
      ! {{GUEST_VN}}\n! {{GUEST_DFGW}} \n! {{ VLAN_GUEST_1}}\n! {{ VLAN_GUEST_2}}\n\
      ! {{ROUTER_INTF1}}\n! {{GUEST_1_IP}} \n! {{ROUTER_INTF2}}\n! {{GUEST_2_IP}}\
      \ \n! {{ HAS_BYOD }}\n! {{BYOD_LOOPBACK_ID}}\n! {{BYOD_VN}}\n! {{BYOD_DFGW}}\
      \ \n! {{ VLAN_BYOD_1}}\n! {{ VLAN_BYOD_2}}\n! {{BYOD_1_IP}} \n! {{BYOD_2_IP}}\
      \ \n! {{BGP_ASN}}\n! {{LOOPBACK0}}\n! {{Primary_Loopback0}}  \n! {{AGGREGATE_CLIENT_GUEST\
      \ }}\n! {{NEIGHBOR_ASN}}\n! {{GUEST_NEIGHBOR_1}}\n! {{GUEST_NEIGHBOR_2}}\n!\
      \ {{AGGREGATE_CLIENT_BYOD }}\n! {{BYOD_NEIGHBOR_1}} \n! {{BYOD_NEIGHBOR_2}}\
      \ \n! {{PRIMARY_LOOPBACK1_IP}}\n! {{ DNAC_WILDCARDS }}\n!\n{% set MASK_PFX =\
      \ {\"255.255.255.255\": \"/32\", \"255.255.255.254\": \"/31\", \"255.255.255.252\"\
      : \"/30\", \"255.255.255.248\": \"/29\", \"255.255.255.240\": \"/28\", \"255.255.255.224\"\
      : \"/27\", \"255.255.255.192\": \"/26\", \"255.255.255.128\": \"/25\", \"255.255.255.0\"\
      : \"/24\", \"255.255.254.0\": \"/23\", \"255.255.252.0\": \"/22\", \"255.255.248.0\"\
      : \"/21\", \"255.255.2.0\": \"/22\", \"255.255.224.0\": \"/19\", \"255.255.192.0\"\
      : \"/18\", \"255.255.128.0\": \"/17\", \"255.255.0.0\": \"/16\", \"255.254.0.0\"\
      : \"/15\", \"255.252.0.0\": \"/14\", \"255.248.0.0\": \"/13\", \"255.240.0.0\"\
      : \"/12\", \"255.224.0.0\": \"/11\", \"255.192.0.0\": \"/10\", \"255.128.0.0\"\
      : \"/9\", \"255.0.0.0\": \"/8\", \"254.0.0.0\": \"/7\", \"252.0.0.0\": \"/6\"\
      , \"248.0.0.0\": \"/5\", \"240.0.0.0\": \"/4\", \"224.0.0.0\": \"/3\", \"192.0.0.0\"\
      : \"/2\", \"128.0.0.0\": \"/1\", \"0.0.0.0\": \"/0\"} %}\n!\ninterface Loopback1\n\
      \ description Anycast Guest Border IP\n ip address {{Primary_Loopback0}} 255.255.255.255\n\
      \ ip access-group DENY_DNAC in\n shutdown\n!\n{% if IS_SWITCH == \"Yes\" %}\n\
      {% for INTF in INTERFACES %}\ninterface {{INTF}}\n description Trunk to Exterior\n\
      \ switchport mode trunk\n no shutdown\n!\n{% endfor %}\n{% endif %}\n{% if HAS_GUEST\
      \ == \"Yes\" %}\ninterface Loopback{{GUEST_LOOPBACK_ID}}\n description Loopback\
      \ Border\n vrf forwarding {{GUEST_VN}}\n ip address {{GUEST_DFGW}} 255.255.255.255\n\
      !\n{% if IS_SWITCH == \"Yes\" %}\nvlan {{VLAN_GUEST_1}}\n name GUEST_TO_DC_INT1\n\
      vlan {{VLAN_GUEST_2}}\n name GUEST_TO_DC_INT2\n!\ninterface Vlan {{VLAN_GUEST_1}}\n\
      {% else %}\ninterface {{ROUTER_INTF1}}.{{VLAN_GUEST_1}}\n encapsulation dot1q\
      \ {{VLAN_GUEST_1}}\n{% endif %}\n description vrf interface to External router\n\
      \ vrf forwarding {{GUEST_VN}}\n ip address {{GUEST_1_IP}} 255.255.255.252\n\
      \ no ip redirects\n ip route-cache same-interface\n!\n{% if IS_SWITCH == \"\
      Yes\" %}\ninterface Vlan {{VLAN_GUEST_2}}\n{% else %}\ninterface {{ROUTER_INTF2}}.{{VLAN_GUEST_2}}\n\
      \ encapsulation dot1q {{VLAN_GUEST_2}}\n{% endif %}\n description vrf interface\
      \ to External router\n vrf forwarding {{GUEST_VN}}\n ip address {{GUEST_2_IP}}\
      \ 255.255.255.252\n no ip redirects\n ip route-cache same-interface\n!\n{% endif\
      \ %}\n{% if HAS_BYOD == \"Yes\" %}\ninterface Loopback{{BYOD_LOOPBACK_ID}}\n\
      \ description Loopback Border\n vrf forwarding {{BYOD_VN}}\n ip address {{BYOD_DFGW}}\
      \ 255.255.255.255\n!\n{% if IS_SWITCH == \"Yes\" %}\nvlan {{VLAN_BYOD_1}}\n\
      \ name BYOD_TO_DC_INT1\nvlan {{VLAN_BYOD_2}}\n name BYOD_TO_DC_INT2\n!\ninterface\
      \ Vlan {{VLAN_BYOD_1}}\n{% else %}\ninterface {{ROUTER_INTF1}}.{{VLAN_BYOD_1}}\n\
      \ encapsulation dot1q {{VLAN_BYOD_1}}\n{% endif %}\n description vrf interface\
      \ to External router\n vrf forwarding {{BYOD_VN}}\n ip address {{BYOD_1_IP}}\
      \ 255.255.255.252\n no ip redirects\n ip route-cache same-interface\n!\n{% if\
      \ IS_SWITCH == \"Yes\" %}\ninterface Vlan {{VLAN_BYOD_2}}\n{% else %}\ninterface\
      \ {{ROUTER_INTF2}}.{{VLAN_BYOD_2}}\n encapsulation dot1q {{VLAN_BYOD_2}}\n{%\
      \ endif %}\n description vrf interface to External router\n vrf forwarding {{BYOD_VN}}\n\
      \ ip address {{BYOD_2_IP}} 255.255.255.252\n no ip redirects\n ip route-cache\
      \ same-interface\n!\n{% endif %}\n!\nrouter bgp {{BGP_ASN}}\n bgp router-id\
      \ {{LOOPBACK0}}\n bgp log-neighbor-changes\n network {{Primary_Loopback0}} mask\
      \ 255.255.255.255\n network {{LOOPBACK0}} mask 255.255.255.255\n!\n{% if HAS_GUEST\
      \ == \"Yes\" %}\n address-family ipv4 vrf {{GUEST_VN}}\n  bgp aggregate-timer\
      \ 0\n  network {{GUEST_DFGW}} mask 255.255.255.255\n{% for AGG in AGGREGATE_CLIENT_GUEST.split(\"\
      ;\") %}\n  aggregate-address {{AGG}} summary-only\n{% endfor %}\n  redistribute\
      \ lisp metric 10\n  neighbor {{GUEST_NEIGHBOR_1}} remote-as {{NEIGHBOR_ASN}}\n\
      \  neighbor {{GUEST_NEIGHBOR_1}} activate\n  neighbor {{GUEST_NEIGHBOR_1}} advertise-map\
      \ RM-CLIENT-PASS non-exist-map RM-CONDITIONAL-PRIMARY\n  neighbor {{GUEST_NEIGHBOR_1}}\
      \ weight 65535\n  neighbor {{GUEST_NEIGHBOR_2}} remote-as {{NEIGHBOR_ASN}}\n\
      \  neighbor {{GUEST_NEIGHBOR_2}} activate\n  neighbor {{GUEST_NEIGHBOR_2}} advertise-map\
      \ RM-CLIENT-PASS non-exist-map RM-CONDITIONAL-PRIMARY\n  neighbor {{GUEST_NEIGHBOR_2}}\
      \ weight 65535\n{% if IS_SWITCH == \"Yes\" %}\n  neighbor {{GUEST_NEIGHBOR_1}}\
      \ update-source Vlan{{VLAN_GUEST_1}}\n  neighbor {{GUEST_NEIGHBOR_2}} update-source\
      \ Vlan{{VLAN_GUEST_2}}\n{% else %}\n  neighbor {{GUEST_NEIGHBOR_1}} update-source\
      \ {{ROUTER_INTF1}}.{{VLAN_GUEST_1}}\n  neighbor {{GUEST_NEIGHBOR_2}} update-source\
      \ {{ROUTER_INTF2}}.{{VLAN_GUEST_2}}\n{% endif %}\n exit-address-family\n!\n\
      {% endif %}\n{% if HAS_BYOD == \"Yes\" %}\n address-family ipv4 vrf {{BYOD_VN}}\n\
      \  bgp aggregate-timer 0\n  network {{BYOD_DFGW}} mask 255.255.255.255\n{% for\
      \ AGG in AGGREGATE_CLIENT_BYOD.split(\";\") %}\n  aggregate-address {{AGG}}\
      \ summary-only\n{% endfor %}\n  redistribute lisp metric 10\n  neighbor {{BYOD_NEIGHBOR_1}}\
      \ remote-as {{NEIGHBOR_ASN}}\n  neighbor {{BYOD_NEIGHBOR_1}} activate\n  neighbor\
      \ {{BYOD_NEIGHBOR_1}} advertise-map RM-CLIENT-PASS non-exist-map RM-CONDITIONAL-PRIMARY\n\
      \  neighbor {{BYOD_NEIGHBOR_1}} weight 65535\n  neighbor {{BYOD_NEIGHBOR_2}}\
      \ remote-as {{NEIGHBOR_ASN}}\n  neighbor {{BYOD_NEIGHBOR_2}} activate\n  neighbor\
      \ {{BYOD_NEIGHBOR_2}} advertise-map RM-CLIENT-PASS non-exist-map RM-CONDITIONAL-PRIMARY\n\
      \  neighbor {{BYOD_NEIGHBOR_2}} weight 65535\n{% if IS_SWITCH == \"Yes\" %}\n\
      \  neighbor {{BYOD_NEIGHBOR_1}} update-source Vlan{{VLAN_BYOD_1}}\n  neighbor\
      \ {{BYOD_NEIGHBOR_2}} update-source Vlan{{VLAN_BYOD_2}}\n{% else %}\n  neighbor\
      \ {{BYOD_NEIGHBOR_1}} update-source {{ROUTER_INTF1}}.{{VLAN_BYOD_1}}\n  neighbor\
      \ {{BYOD_NEIGHBOR_2}} update-source {{ROUTER_INTF2}}.{{VLAN_BYOD_2}}\n{% endif\
      \ %}\n exit-address-family\n!\n{% endif %}\n!\n{% set SEQUENCE_NUMBER = 0 %}\n\
      {% if HAS_GUEST == \"Yes\" %}\n{% for AGG in AGGREGATE_CLIENT_GUEST.split(\"\
      ;\") %}\n{% set SEQUENCE_NUMBER = SEQUENCE_NUMBER + 5 %}\n{% set IP_BASE = AGG.trim().split(\"\
      \ \")[0].trim() %}\n{% set PFX = MASK_PFX.get(AGG.trim().split(\" \")[1].trim())\
      \ %}\nip prefix-list PL-CLIENT-PASS seq {{SEQUENCE_NUMBER}} permit {{IP_BASE}}{{PFX}}\n\
      {% endfor %}\n{% endif %}\n{% if HAS_BYOD == \"Yes\" %}\n{% for AGG in AGGREGATE_CLIENT_BYOD.split(\"\
      ;\") %}\n{% set SEQUENCE_NUMBER = SEQUENCE_NUMBER + 5 %}\n{% set IP_BASE = AGG.trim().split(\"\
      \ \")[0].trim() %}\n{% set PFX = MASK_PFX.get(AGG.trim().split(\" \")[1].trim())\
      \ %}\nip prefix-list PL-CLIENT-PASS seq {{SEQUENCE_NUMBER}} permit {{IP_BASE}}{{PFX}}\n\
      {% endfor %}\n{% endif %}\n!\nip prefix-list PL-CONDITIONAL-PRIMARY seq 5 permit\
      \ {{PRIMARY_LOOPBACK1_IP}}/32\n!\nip access-list extended DENY_DNAC\n{% for\
      \ ADDR in DNAC_WILDCARDS.split(\";\") %}\n deny ip {{ADDR}} host {{LOOPBACK0}}\n\
      {% endfor %}\n permit ip any any\n!\nroute-map RM-CLIENT-PASS permit 10\n match\
      \ ip address prefix-list PL-CLIENT-PASS\n!\nroute-map RM-CONDITIONAL-PRIMARY\
      \ permit 10\n match ip address prefix-list PL-CONDITIONAL-PRIMARY\n!\nevent\
      \ manager applet EEM_GBN1_LO1_RESTORED maxrun 60\n event routing network {{PRIMARY_LOOPBACK1_IP}}/32\
      \ type add ge 32 le 32\n  action 010 syslog priority 7 msg \"EEM_GBN1_LO1_RESTORED\
      \ triggered. Cause: $_routing_network/$_routing_prefix_len $_routing_type from\
      \ $_routing_protocol in the VRF: $_routing_vrf_name\" \n  action 020 syslog\
      \ priority 7 msg \"EEM_GBN1_LO1_RESTORED will shut down the local Loopback1\
      \ on the secondary GBN.\" \n  action 030 cli command \"enable\"\n  action 040\
      \ cli command \"configure terminal\"\n  action 050 cli command \"interface loopback1\"\
      \n  action 060 cli command \"shutdown\"\n  action 070 cli command \"end\"\n\
      \  action 080 syslog priority 4 msg \"EEM_GBN1_LO1_RESTORED has shut down the\
      \ local Loopback1 on the secondary GBN.\" \n!\nevent manager applet EEM_GBN1_LO1_LOST\
      \ maxrun 60\n event routing network {{PRIMARY_LOOPBACK1_IP}}/32 type remove\
      \ ge 32 le 32\n  action 010 syslog priority 7 msg \"EEM_GBN1_LO1_LOST triggered.\
      \ Cause: $_routing_network/$_routing_prefix_len $_routing_type from $_routing_protocol\
      \ in the VRF: $_routing_vrf_name\" \n  action 020 syslog priority 7 msg \"EEM_GBN1_LO1_LOST\
      \ will enable the local Loopback1 on the secondary GBN.\" \n  action 030 cli\
      \ command \"enable\"\n  action 040 cli command \"configure terminal\"\n  action\
      \ 050 cli command \"interface loopback1\"\n  action 060 cli command \"no shutdown\"\
      \n  action 070 cli command \"end\"\n  action 080 syslog priority 4 msg \"EEM_GBN1_LO1_LOST\
      \ has enabled the local Loopback1 on the secondary GBN.\" \n!\nevent manager\
      \ applet EEM_SYSTEM_RELOADED maxrun 60\n event syslog pattern \"%SYS-5-RESTART\"\
      \n  action 010 syslog priority 7 msg \"EEM_SYSTEM_RELOADED triggered. Cause:\
      \ Syslog pattern matching found the device restart mnemonic.\"\n  action 020\
      \ syslog priority 7 msg \"EEM_SYSTEM_RELOADED will ensure the local Loopback1\
      \ is shut down.\"\n  action 030 syslog priority 4 msg \"EEM_SYSTEM_RELOADED\
      \ notes - if the primary GBN is down, please enable Loopback1 manually.\"\n\
      \  action 040 cli command \"enable\"\n  action 050 cli command \"configure terminal\"\
      \n  action 060 cli command \"interface loopback1\"\n  action 070 cli command\
      \ \"shutdown\"\n  action 080 cli command \"end\"\n  action 090 syslog priority\
      \ 4 msg \"EEM_SYSTEM_RELOADED has shut down the local Loopback1 on the secondary\
      \ GBN.\" \n!\n{% endraw %}"
