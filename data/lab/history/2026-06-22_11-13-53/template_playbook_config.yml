      \ 1.1 cli command \"cts refresh environment-data\"\n action 2.0 syslog msg \"\
      EEM: CTS refresh completed after RADIUS_DEAD for 65.1.1.244\"\nevent manager\
      \ applet RADIUS_ALIVE_CTS_REFRESH authorization bypass\n description \"Run CTS\
      \ refresh when RADIUS 65.1.1.244 is ALIVE\"\n event syslog pattern \"RADIUS\
      \ server 65\\\\.1\\\\.1\\\\.244:1812,1813 is being marked alive\\\\.\"\n action\
      \ 0.5 syslog msg \"EEM: RADIUS_ALIVE detected for 65.1.1.244 - running 'cts\
      \ refresh environment-data'\"\n action 1.0 cli command \"enable\"\n action 1.05\
      \ cli command \"clear cts environment-data\"\n action 1.1 cli command \"cts\
      \ refresh environment-data\"\n action 2.0 syslog msg \"EEM: CTS refresh completed\
      \ after RADIUS_ALIVE for 65.1.1.244\""
