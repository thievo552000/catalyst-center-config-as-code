- configuration_templates:
    template_name: SNMP_BR_GL
    template_description: Template for SNMP Configuration for all 9K Switches Branches
    project_name: RBC_Template_Blocks
    language: VELOCITY
    composite: false
    software_type: IOS-XE
    custom_params_order: false
    device_types:
    - product_family: Switches and Hubs
    template_content: "! SNMP_Section\n\nip access-list standard 15\n remark Cisco_Prime,\
      \ DNAC, NetMRI,Spectrum\n permit 10.172.128.0 0.0.1.255\n permit 10.174.128.0\
      \ 0.0.1.255\n permit 142.245.206.0 0.0.1.255\n permit 10.39.250.0 0.0.0.255\n\
      \ permit 10.37.250.0 0.0.0.255\n permit 10.253.33.0 0.0.0.255\n permit 10.253.137.0\
      \ 0.0.0.255\n\nsnmp-server community R[s]73pzJWs RO 15\nsnmp-server queue-length\
      \ 25\nsnmp-server location $SNMP_Location\nsnmp-server host 142.245.206.22 traps\
      \ version 2c R[s]73pzJWs \nsnmp-server host 142.245.207.22 traps version 2c\
      \ R[s]73pzJWs \nsnmp-server host 142.245.206.9 traps version 2c R[s]73pzJWs\n\
      snmp-server host 142.245.207.9 traps version 2c R[s]73pzJWs\nsnmp-server host\
      \ 142.245.206.69 traps version 2c R[s]73pzJWs\nsnmp-server host 142.245.207.70\
      \ traps version 2c R[s]73pzJWs\nsnmp-server host 142.245.206.6 traps version\
      \ 2c R[s]73pzJWs\nsnmp-server host 142.245.207.6 traps version 2c R[s]73pzJWs\n\
      snmp-server host 10.39.250.28 traps version 2c R[s]73pzJWs\nsnmp ifmib ifindex\
      \ persist\n\nsnmp-server trap-source $Src_Interface\n\nno snmp-server enable\
      \ traps\nsnmp-server enable traps snmp authentication linkdown linkup coldstart\
      \ warmstart\nsnmp-server enable traps vlancreate\nsnmp-server enable traps vlandelete\n\
      snmp-server enable traps cpu threshold\nsnmp-server enable traps memory bufferpeak\n\
      snmp-server enable traps stackwise\nsnmp-server enable traps fru-ctrl\nsnmp-server\
      \ enable traps envmon\nsnmp-server enable traps config\nsnmp-server enable traps\
      \ stpx inconsistency root-inconsistency loop-inconsistency\nsnmp-server enable\
      \ traps transceiver all\n\nprocess cpu threshold type total rising 80 interval\
      \ 20 falling 50 interval 20"
    template_tag:
    - id: 5df9d55e-4b69-4ea8-937e-44ff313b0b47
