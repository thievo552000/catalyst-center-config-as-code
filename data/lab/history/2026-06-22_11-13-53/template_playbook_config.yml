- configuration_templates:
    template_name: InterfacesGF_GU_GL
    project_name: Templates Global
    author: admin
    language: JINJA
    composite: false
    software_type: IOS-XE
    custom_params_order: true
    device_types:
    - product_family: Switches and Hubs
    template_content: "{% raw %}{# Macros are located in the folder -> Abigail Macro\
      \ Templates #}\n{% include \"The_Macro_Library/Macro: NAC\" %}\n{% include \"\
      The_Macro_Library/Macro: Interface Configs\" %}\n{% include \"The_Macro_Library/Macro:\
      \ L3_Vlans\" %}\n!\ninterface Loopback0\n description {{Hostname}} Mgmt interface\n\
      \ exit\n!\nvtp domain campus\n!\nspanning-tree portfast bpduguard default  \
      \                           \nspanning-tree extend system-id\nspanning-tree\
      \ uplinkfast\nspanning-tree backbonefast\ndiagnostic bootup level complete\n\
      qos queue-softmax-multiplier 1200\nudld enable\n!\n{% macro InterfacesGF_GU_GL(SWorLC_Num,\
      \ floor, User_Data_VLAN, voice_vlan) %}\n{#{% if basic_services == 'TRUE' %}#}\n\
      {{basic_services()}}\n{#{% endif %}#}\n\n{% if Region == 'CANADA' %}\n! Canadian\
      \ Multicast Config\n{{multicast()}}\n{% else %}\n! No Multicast Config\n{% endif%}\n\
      \n{% if ADD_NAC_CONFIG != true %}\n! No Global NAC Config required\n\n{% elif\
      \ Region == 'CANADA' %}\n{{nac_CAN()}}\n\n{% elif Region == 'US' or Region ==\
      \ 'CARIBBEAN' %}\n{{nac_US_CAR()}}\n\n{% endif %}\n\n{% if user_ports == 'TRUE'\
      \ %}\n! User Ports Basic Config including NAC\n\n{% if switch_model == 'C9300'\
      \ %}\n\n{%for counter in range(SWorLC_Num)%}\ninterface range GigabitEthernet{{loop.index}}/0/1-48\n\
      {{GU_User_Port()}}\n{{interface_NAC()}}\n{%endfor%}\n{% elif switch_model ==\
      \ 'C9407R' %}\n\n{{switch_C9407RorC9410R()}}\n\n{% set SWorLC_Num = SWorLC_Num\
      \ - 2 + 5 %}\n{%for counter in range(5, SWorLC_Num)%}\n\ninterface range GigabitEthernet{{counter}}/0/1-48\n\
      {{GU_User_Port()}}\n{{interface_NAC()}}\n\n{%endfor%}\n{% elif switch_model\
      \ == 'C9410R' %}\n\n{{switch_C9407RorC9410R()}}\n\n{% if SWorLC_Num > 4%}\n\
      {% set SWorLC_Num = SWorLC_Num + 3%}\n{% else %}\n{% set SWorLC_Num = SWorLC_Num\
      \ + 1%}\n{% endif %}\n\n{%for counter in range (3, SWorLC_Num) %}\n{% if counter\
      \ != 5 and counter != 6 %}\n\ninterface range GigabitEthernet{{counter}}/0/1-48\n\
      {{GU_User_Port()}}\n{{interface_NAC()}}\n\n{% endif%}\n{%endfor%}\n{% endif\
      \ %}\n{% endif %}\n\n\n{% if wifi_ports == 'TRUE' %}\n! Wifi Ports\n\ndefault\
      \ interface range {{ap_port_range}}\n!\ninterface range {{ap_port_range}}\n\
      {{GU_ap_port()}}\n{% endif %}\n\n\n{% if atm == 'TRUE' %}\n!Configuring ATM\
      \ VLAN \n{{atm_vlan()}}\n!\n!Configuring ATM Ports\ndefault interface range\
      \ {{atm_port_range}}\n!\ninterface range {{atm_port_range}}\n{{GU_atm_port()}}\n\
      {% endif %}\n\n\n{% if ipcc == 'TRUE' %}\n!Configuring IPCC VLAN \n{{ipcc_vlan()}}\n\
      {% endif %}\n\n{% if turret == 'TRUE' %}\n!Configuring Turret VLAN \n{{turret_vlan()}}\n\
      !\n!Configuring Turret Ports\ndefault interface range {{turret_port_range}}\n\
      !\ninterface range {{turret_port_range}}\n{{GU_turret_port()}}\n{{interface_NAC()}}\n\
