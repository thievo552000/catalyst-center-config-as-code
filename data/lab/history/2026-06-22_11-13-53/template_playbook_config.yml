      \ Standard: 20.1\n!\n! Workaround for Jinja defect\n! {{ PCI_DESTINATION_INTFS\
      \ }} \n! {{ SPEED }}\n! {{ SPAN_ID }} \n! {{ CORPORATE_VN_VOICE_VLAN }}\n!\n\
      ! Configure the interface(s)\n{% for INTF in PCI_DESTINATION_INTFS %} \ninterface\
      \ {{ INTF }}\n no switchport\n no ip address\n speed {{ SPEED }}\n duplex full\n\
