    software_type: IOS-XE
    custom_params_order: false
    device_types:
    - product_family: Switches and Hubs
    template_content: "#if ($HARDENING_TACACS == true)\n! TACACS_AND_HARDENING Section\n\
      \naaa new-model\naaa session-id common\n\ntacacs server TACACS-SERVER-1\naddress\
      \ ipv4 10.209.34.110\nkey $Tacacs_Key\ntimeout 15\nsingle-connection\n\ntacacs\
      \ server TACACS-SERVER-2\naddress ipv4 10.236.110.108\nkey $Tacacs_Key\ntimeout\
      \ 15\nsingle-connection\n\naaa group server tacacs+ TacacsAAA\nserver name TACACS-SERVER-1\n\
      server name TACACS-SERVER-2\n\nip tacacs source-interface Vlan99\naaa authentication\
      \ banner ^Unauthorized Access Prohibited^\naaa authentication fail-message ^Login\
      \ Failed^\naaa authentication password-prompt LocalPassword:\naaa authentication\
      \ username-prompt LocalUsername:\naaa authentication login default group TacacsAAA\
      \ local enable\naaa authentication enable default group TacacsAAA enable\naaa\
      \ authorization config-commands\naaa authorization exec default group TacacsAAA\
      \ local if-authenticated\naaa authorization commands 1 default group TacacsAAA\
      \ local if-authenticated\naaa authorization commands 8 default group TacacsAAA\
      \ local if-authenticated\naaa authorization commands 15 default group TacacsAAA\
      \ local if-authenticated\naaa accounting send stop-record authentication failure\n\
      aaa accounting suppress null-username\naaa accounting exec default start-stop\
      \ group TacacsAAA\naaa accounting commands 1 default start-stop group TacacsAAA\n\
