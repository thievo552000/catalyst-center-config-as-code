- configuration_templates:
    template_name: IPsec for Branch Router - System Default
    template_description: IPsec for Branch Router - System Default
    project_name: Cloud DayN Templates
    author: SYSTEM
    language: VELOCITY
    composite: false
    software_type: IOS-XE
    custom_params_order: false
    device_types:
    - product_family: Routers
    template_content: "!--- Crypto Config ---\ncrypto isakmp policy 200\nencr aes\n\
      authentication pre-share\ngroup 2\nlifetime 28800\ncrypto isakmp key cisco address\
      \ 0.0.0.0\ncrypto isakmp keepalive 10 10\n!\ncrypto ipsec security-association\
      \ replay window-size 1024\n!\ncrypto ipsec transform-set csr esp-aes esp-sha-hmac\n\
      mode tunnel\ncrypto ipsec df-bit clear\n!\n!\ncrypto ipsec profile csr-prof\n\
      set transform-set csr\n!\n!--- IPsec Tunnel Config ---\ninterface Tunnel11\n\
      shutdown\nip address $TunnelRouterIP1 $TunnelSubnetMask1\ntunnel source $TunnelSource1\n\
      tunnel destination $TunnelDestinationIP1\ntunnel protection ipsec profile csr-prof\n\
      tunnel mode ipsec ipv4\nip mtu $mtu\nip tcp adjust-mss 1360\nno shutdown\n!\n\
      interface Tunnel12\nshutdown\nip address $TunnelRouterIP2 $TunnelSubnetMask2\n\
      tunnel source $TunnelSource2\ntunnel destination $TunnelDestinationIP2\ntunnel\
      \ protection ipsec profile csr-prof\ntunnel mode ipsec ipv4\nip mtu $mtu\nip\
      \ tcp adjust-mss 1360\nno shutdown\n!\ninterface Loopback0\nip address $OspfRouterId\
      \ 255.255.255.255\n!\n!--- BGP Config ---\nrouter bgp $AutonomousSystemNumber\n\
      \ bgp log-neighbor-changes\n neighbor $CSRTunnelIP1 remote-as $NeighborBgpASNOfCloudRouter1\n\
      \ neighbor $CSRTunnelIP1 timers 10 30 30\n neighbor $CSRTunnelIP2 remote-as\
      \ $NeighborBgpASNOfCloudRouter2\n neighbor $CSRTunnelIP2 timers 10 30 30\n !\n\
      address-family ipv4\n  network $OspfRouterId mask 255.255.255.255\n  neighbor\
      \ $CSRTunnelIP1 activate\n  neighbor $CSRTunnelIP1 as-override\n  neighbor $CSRTunnelIP1\
      \ soft-reconfiguration inbound\n  neighbor $CSRTunnelIP2 activate\n  neighbor\
      \ $CSRTunnelIP2 as-override\n  neighbor $CSRTunnelIP2 soft-reconfiguration inbound\n\
      \ exit-address-family\n!"
    template_tag:
    - id: f3258ac4-6a45-4058-82ca-57addd0265d7
      name: branch-router-ipsec
