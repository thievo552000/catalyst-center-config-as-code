      \ NRP_DEFAULT\n!\nroute-map CSPNA-CCI-IN permit 10\n match community NRP_CSPNA_PRIMARY\n\
      \ set local-preference 8000\n!\nroute-map CSPNA-CCI-IN permit 20\n match community\
