      spanning-tree uplinkfast

      spanning-tree backbonefast

      diagnostic bootup level complete

      qos queue-softmax-multiplier 1200

      udld enable

      !

      {#{% if basic_services == ''true'' %}#}

      {{basic_services()}}

      {#{% endif %}#}


      {% if Region == ''CANADA'' %}

      ! Canadian Multicast Config

      {{multicast()}}

      {% else %}

      ! No Multicast Config

      {% endif%}


      {% if ADD_NAC_CONFIG != true %}

      ! No Global NAC Config required


      {% elif Region == ''CANADA'' %}

      {{nac_CAN()}}


      {% elif Region == ''US'' or Region == ''CARIBBEAN'' %}

      {{nac_US_CAR()}}


      {% endif %}


      ! User Ports Basic Config including NAC

      {% for interface in __interface %}

      {% if interface.interfaceType == ''Physical'' and interface.portMode != ''routed''
      and interface.portMode != ''trunk'' %}

      {% set port_name = interface.portName.replaceAll("^([TGF][a-zA-Z]+).*","$1")
      %}

      {% set port_card = interface.portName.replaceAll("^[TGF][a-zA-Z]+(\\d+)/(\\d+)/(\\d+)",
      "$1") %}

      {% set fixed_ports = interface.portName.replaceAll("^[TGF][a-zA-Z]+(\\d+)/(\\d+)/(\\d+)",
      "$2") %}

      {% set port_number = interface.portName.replaceAll("^[TGF][a-zA-Z]+(\\d+)/(\\d+)/(\\d+)",
      "$3") %}


      {% if ''C9300'' in __device.platformId %}

      {% if port_name != interface.portName and fixed_ports == 0 %}

      interface {{interface.portName}}

      {{GU_User_Port()}}

      {{interface_NAC()}}

      {% endif %}

      {% elif ''C9407'' in __device.platformId %}

      {% if port_name != interface.portName and port_card != 3 and port_card != 4
      %}

      interface {{interface.portName}}

      {{GU_User_Port()}}

      {{interface_NAC()}}

      {% endif %}

      {% elif ''C9410'' in __device.platformId %}

      {% if port_name != interface.portName and port_card != 5 and port_card != 6
      %}

      interface {{interface.portName}}

      {{GU_User_Port()}}

      {{interface_NAC()}}

      {% endif %}

      {% endif %}

      {% endif %}

      {% endfor %}



      {% if wifi_ports == ''true'' %}

      ! Wifi Ports


      {% if ''C9300'' in __device.platformId %}

      {% set sw_num = __device.platformId.split(",") | length %}

      {% if sw_num == 1 %}

      {% set ap_port_range = ''1/41-1/48'' %}

      ! AP Port Range {{ ap_port_range }}

      {% else %}

      {% set ap_port_range = ''1/41-2/48'' %}

      ! AP Port Range {{ ap_port_range }}

      {% endif %}

      {% elif ''C9407'' in __device.platformId or ''C9410'' in __device.platformId
      %}

      {% set ap_port_range = ''1/37-2/48'' %}

      ! AP Port Range {{ ap_port_range }}

      {% else %}

      ! Platform is not CAT 9K

      {% endif %}

      {% set lc_from = ap_port_range.replaceAll("^([\\d]+)/([\\d]+)-([\\d]+)/([\\d]+)","$1")
      | int %}

      {% set pc_from = ap_port_range.replaceAll("^([\\d]+)/([\\d]+)-([\\d]+)/([\\d]+)","$2")
      | int %}

      {% set lc_to = ap_port_range.replaceAll("^([\\d]+)/([\\d]+)-([\\d]+)/([\\d]+)","$3")
      | int %}

      {% set pc_to = ap_port_range.replaceAll("^([\\d]+)/([\\d]+)-([\\d]+)/([\\d]+)","$4")
      | int %}

      {% set lc_to = lc_to + 1 %}

      {% set pc_to = pc_to + 1 %}


      {% for interface in __interface %}

      {% if interface.interfaceType == ''Physical'' and interface.portMode != ''routed''
      and interface.portMode != ''trunk'' %}

      {% set port_name = interface.portName.replaceAll("^([TGF][a-zA-Z]+).*","$1")
      %}

      {% set port_card = interface.portName.replaceAll("^[TGF][a-zA-Z]+(\\d+)/(\\d+)/(\\d+)",
      "$1") %}

      {% set port_number = interface.portName.replaceAll("^[TGF][a-zA-Z]+(\\d+)/(\\d+)/(\\d+)",
      "$3") %}

      {% if port_name != interface.portName %}

      {% for lc in range(lc_from, lc_to) %}

      {% for pc in range (pc_from, pc_to) %}

      {% if lc == port_card && pc == port_number %}

      ! AP port

      default interface {{ interface.portName }}

      interface {{ interface.portName }}

      {{ GU_ap_port() }}

      ! end AP port

      {% endif %}

      {% endfor %}

      {% endfor %}

      {% endif %}

      {% endif %}

      {% endfor %}

      {% endif %}{% endraw %}'
- configuration_templates:
    template_name: InterfacesGF_BR_GL
    project_name: Templates Global
    language: JINJA
    composite: false
    software_type: IOS-XE
    custom_params_order: true
    device_types:
    - product_family: Switches and Hubs
    template_content: "{% raw %}{# Macros are located in the folder -> Abigail Macro\
      \ Templates #}\n{% include \"The_Macro_Library/Macro: Interface Configs\" %}\n\
      {% include \"The_Macro_Library/Macro: NAC\" %}\n{% include \"The_Macro_Library/Macro:\
      \ Vlan\" %}\n{% include \"The_Macro_Library/Macro: DHCP Snooping\" %}\n\n{#\
      \ Choose the stack type that will be used throughout the template \n   The stack\
      \ type will determine which interface number will be used \n#}\n{% if STACK_TYPE\
      \ == '1x24' %}\n\n\n{% elif STACK_TYPE == '1x48'%}\n\n\n{% elif STACK_TYPE ==\
      \ '2x24'%}\n\n\n{% elif STACK_TYPE == '2x48'%}\n\n\n{% elif STACK_TYPE == '1x48+1x24'%}\n\
      \n\n{% elif STACK_TYPE == '2x48+1x24'%}\n\n\n{% elif STACK_TYPE == '3x48'%}\n\
      \n\n{% elif STACK_TYPE == '3x48+1x24'%}\n\n\n{% elif STACK_TYPE == '4x48'%}\n\
      \n\n{% endif %}\n\n\n{% if (STACK_TYPE == '1x24') %}\ninterface range gi 1/0/1\
      \ - 24\n description I,\n\ninterface range gi 1/0/2 - 24\n description I,\n\
      \ shut\n{% endif %}\n\n{% if (STACK_TYPE == '1x48') %}\ninterface range gi 1/0/2\
      \ - 48\n description I,\n\ninterface range gi 1/0/2 - 48\n description I,\n\
      \ shut\n{% endif %}\n\n{% if (STACK_TYPE == '2x24') %}\n\ninterface range gi\
      \ 1/0/1 - 24, gi 2/0/1 -24\n description I,\n\ninterface range gi 1/0/2 - 24,\
      \ gi 2/0/2 -24\n description I,\n shut\n{% endif %}\n\n{% if (STACK_TYPE ==\
      \ '1x48+1x24') %}\ninterface range gi 1/0/1 - 48, gi 2/0/1 -24\n description\
      \ I,\n\ninterface range gi 1/0/2 - 48, gi 2/0/2 -24\n description I,\n shut\n\
      {% endif %} \n\n{%if (STACK_TYPE == '2x48') %}\ninterface range gi 1/0/1 - 48,\
      \ gi 2/0/1 -48\n description I,\n\ninterface range gi 1/0/2 - 48, gi 2/0/2 -48\n\
      \ description I,\n shut\n{% endif %}\n\n{% if (STACK_TYPE == '2x48+1x24') %}\n\
      interface range gi 1/0/1 - 48, gi 2/0/1 -48, gi 3/0/1 - 24\n description I,\n\
      \ninterface range gi 1/0/2 - 48, gi 2/0/2 -48, gi 3/0/1 - 24\n description I,\n\
      \ shut\n{% endif %}\n\n{% if (STACK_TYPE == '3x48') %}\ninterface range gi 1/0/1\
      \ - 48, gi 2/0/1 -48, gi 3/0/1 - 48\n description I,\n\ninterface range gi 1/0/2\
      \ - 48, gi 2/0/2 -48, gi 3/0/1 - 48\n description I,\n shut\n{% endif %}\n\n\
      {% if (STACK_TYPE == '3x48+1x24') %}\ninterface range gi 1/0/1 - 48, gi 2/0/1\
      \ -48, gi 3/0/1 - 48, gi 4/0/1 - 24\n description I,\n\ninterface range gi 1/0/2\
      \ - 48, gi 2/0/2 -48, gi 3/0/1 - 48, gi 4/0/1 - 24\n description I,\n shut\n\
      {% endif %}\n\n{% if (STACK_TYPE == '4x48') %}\ninterface range gi 1/0/1 - 48,\
      \ gi 2/0/1 -48, gi 3/0/1 - 48, gi 4/0/1 - 48\n description I,\n\ninterface range\
      \ gi 1/0/2 - 48, gi 2/0/2 -48, gi 3/0/1 - 48, gi 4/0/1 - 48\n description I,\n\
      \ shut\n{% endif %}\n\n{% if ADD_DHCP_SNOOPING != true %}\n\n{% else %}\n{{\
      \ dhcp_snooping () }}\n\n{% endif %}\n\n\n{# States which location will be used\
      \ in a comment \n#}\n{% if LOCATION == 'CANADA' %}\n! LOCATION IS CANADA\n\n\
      {% elif LOCATION == 'US' %}\n! LOCATION IS US\n\n{% elif LOCATION == 'CARIBBEAN'\
      \ %}\n! LOCATION IS CARIBBEAN\n{% endif %}\n\n\n{% if ADD_INTERFACE_TRUNK ==\
      \ true %}\n! INTERFACE_TRUNK_Section FOR GLOBAL\n\n{%if STACK_TYPE == '1x24'\
      \ || STACK_TYPE == '1x48'%}\n  interface range GigabitEthernet1/0/1, GigabitEthernet1/0/2\n\
      \  \n{% elif STACK_TYPE == '2x24' || STACK_TYPE == '2x48' || STACK_TYPE == '1x48+1x24'\
      \ || \nSTACK_TYPE == '2x48+1x24' || STACK_TYPE == '3x48' || STACK_TYPE == '3x48+1x24'\
      \ || STACK_TYPE == '4x48' %}\n  interface range GigabitEthernet1/0/1,GigabitEthernet2/0/1\n\
      \  \n{% endif %} \n\n{{ uplink_WAN() }}\n\ninterface range GigabitEthernet1/0/2\
      \ \ndescription I,Uplink to WAN2 Edge\n\n{% if STACK_TYPE == '2x24' || STACK_TYPE\
      \ == '2x48' || STACK_TYPE == '1x48+1x24' || STACK_TYPE == '2x48+1x24' || \n\
      STACK_TYPE == '3x48' || STACK_TYPE == '3x48+1x24' || STACK_TYPE == '4x48' %}\n\
      interface GigabitEthernet2/0/1\ndescription I,Uplink to WAN2 Edge\n{% endif\
      \ %} \n\n{% endif %}\n\n\n\n\n\n! CANADA SECTION BEGINS\n\n{% if ADD_INTERFACE_SERVER\
      \ == true and LOCATION == 'CANADA' %}\n! INTERFACE_SERVER_Section for CANADA\n\
      \n{% if STACK_TYPE == '1x24' || STACK_TYPE == '1x48' %}\ndefault interface range\
      \ GigabitEthernet1/0/3,GigabitEthernet1/0/22\ninterface range GigabitEthernet1/0/3,GigabitEthernet1/0/22\n\
      \n{% elif STACK_TYPE == '2x24' || STACK_TYPE == '2x48' || STACK_TYPE == '1x48+1x24'\
      \ || \nSTACK_TYPE == '2x48+1x24' || STACK_TYPE == '3x48' || STACK_TYPE == '3x48+1x24'\
      \ || STACK_TYPE == '4x48' %}\ndefault interface range GigabitEthernet1/0/2,GigabitEthernet1/0/3,GigabitEthernet2/0/9\
      \ {# sets to default #}\ninterface range GigabitEthernet1/0/2,GigabitEthernet1/0/3,GigabitEthernet2/0/9\
      \ {# programs it #}\n{% endif %}\n\n{{branch_server()}}\n\ninterface range GigabitEthernet1/0/22\n\
      description SVxx:BRANCH SERVER RSA\n\n{% if STACK_TYPE == '2x24' || STACK_TYPE\
      \ == '2x48' || STACK_TYPE == '1x48+1x24' || STACK_TYPE == '2x48+1x24' || \n\
      STACK_TYPE == '3x48' || STACK_TYPE == '3x48+1x24' || STACK_TYPE == '4x48' %}\n\
      interface GigabitEthernet2/0/9\ndescription SVxx: BRANCH SERVER NIC2\n\ninterface\
      \ GigabitEthernet1/0/2\ndescription SVxx: BRANCH SERVER RSA\n{% endif %}\n\n\
      {% endif %} \n\n\n{% if ADD_INTERFACE_ATM == true and LOCATION == 'CANADA' %}\n\
      ! INTERFACE_ATM_Section FOR CANADA\n \n{% if STACK_TYPE == '1x24' || STACK_TYPE\
      \ == '1x48' %}\ndefault interface range GigabitEthernet 1/0/4 - 5\ninterface\
      \ range GigabitEthernet 1/0/4 - 5\n\n{% elif STACK_TYPE == '2x24' %}\ndefault\
      \ interface range GigabitEthernet 1/0/5,GigabitEthernet2/0/5\ninterface range\
      \ GigabitEthernet 1/0/5,GigabitEthernet2/0/5\n\n{% elif STACK_TYPE == '2x48'\
      \ || STACK_TYPE == '1x48+1x24' || STACK_TYPE == '2x48+1x24' || STACK_TYPE ==\
      \ '3x48' || STACK_TYPE == '3x48+1x24' || STACK_TYPE == '4x48' %}\ndefault interface\
      \ range GigabitEthernet 1/0/4 - 5,GigabitEthernet2/0/4 - 5\ninterface range\
      \ GigabitEthernet 1/0/4 - 5,GigabitEthernet2/0/4 - 5\n{% endif %}\n\n{{atm_port()}}\
      \ \n{% endif %}\n\n\n{% if ADD_INTERFACE_AP == true and LOCATION == 'CANADA'\
      \ %}\n! INTERFACE_AP_Section FOR CANADA\n\n{% if STACK_TYPE == '1x24' %}\ndefault\
      \ interface range GigabitEthernet 1/0/6 - 8\ninterface range GigabitEthernet\
      \ 1/0/6 - 8\n\n{% elif STACK_TYPE == '1x48' %}\ndefault interface range GigabitEthernet\
      \ 1/0/6 - 10\ninterface range GigabitEthernet 1/0/6 - 10\n\n{% elif STACK_TYPE\
      \ == '2x24' %}\ndefault interface range GigabitEthernet 1/0/6 - 7,GigabitEthernet2/0/6\
      \ - 8\ninterface range GigabitEthernet 1/0/6 - 7,GigabitEthernet2/0/6 - 8\n\n\
      {% elif STACK_TYPE == '2x48' || STACK_TYPE == '1x48+1x24' || STACK_TYPE == '2x48+1x24'\
      \ || STACK_TYPE == '3x48' || STACK_TYPE == '3x48+1x24' || STACK_TYPE == '4x48'\
      \ %}\ndefault interface range GigabitEthernet 1/0/6 - 8,GigabitEthernet 2/0/6\
      \ - 8\ninterface range GigabitEthernet 1/0/6 - 8,GigabitEthernet 2/0/6 - 8\n\
      {% endif %}\n\n{{ ap_port ()}} \n\n{% endif %}\n\n\n{% if ADD_NAC_CONFIG !=\
      \ true %}\n\n{% elif LOCATION == 'CANADA' %} \n{{nac_CAN()}}\n\n{% endif %}\n\
      \n! INTERFACE_USER_Section FOR CANADA\n{% if ADD_INTERFACE_USER == true and\
      \ LOCATION == 'CANADA' %}\n\n{% if STACK_TYPE == '1x24' %}\ninterface range\
      \ GigabitEthernet 1/0/9 - 21, GigabitEthernet1/0/23 - 24\n\n{% elif STACK_TYPE\
      \ == '1x48' %}\ninterface range Gi1/0/11 - 21, GigabitEthernet1/0/23 - 48\n\n\
      {% elif STACK_TYPE == '2x24' %}\ninterface range Gi1/0/8 - 24, Gi2/0/10 - 24\n\
      \n{% elif STACK_TYPE == '1x48+1x24' %}\ninterface range Gi1/0/9 - 48, Gi2/0/10\
      \ - 24\n\n{% elif STACK_TYPE == '2x48' %}\ninterface range Gi1/0/9 - 48, Gi2/0/10\
      \ - 48\n\n{% elif STACK_TYPE == '2x48+1x24' %}\ninterface range Gi1/0/9 - 48,\
      \ Gi2/0/10 - 48, Gi3/0/1 - 24\n\n{% elif STACK_TYPE == '3x48' %}\ninterface\
      \ range Gi1/0/9 - 48, Gi2/0/10 - 48, Gi3/0/1 - 48\n\n{% elif STACK_TYPE == '3x48+1x24'\
      \ %}\ninterface range Gi1/0/9 - 48, Gi2/0/10 - 48, Gi3/0/1 - 48, Gi4/0/1 - 24\n\
      \n{% elif STACK_TYPE == '4x48' %}\ninterface range Gi1/0/9 - 48, Gi2/0/10 -\
      \ 48, Gi3/0/1 - 48, Gi4/0/1 - 48\n{% endif %}\n\n{{branch_LAN()}}\n{{interface_NAC()}}\
      \ \nno shut\n\n{% endif %}\n\n{% if ADD_TYCO_PORTS == true and LOCATION == 'CANADA'\
