      description SVxx: BRANCH SERVER RSA\n{% endif %} \n\n{% endif %} \n\n\n{% if\
      \ ADD_INTERFACE_ATM == true and LOCATION == 'CARIBBEAN' %}\n! INTERFACE_ATM_Section\
      \ FOR CARIBBEAN\n\n{% if STACK_TYPE == '1x24' || STACK_TYPE == '1x48' %}\ndefault\
