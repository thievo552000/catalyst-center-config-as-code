- configuration_templates:
    template_name: Add L3 Interfaces
    project_name: Citi Jinja v21.2.1
    language: JINJA
    composite: false
    software_type: IOS-XE
    custom_params_order: true
    device_types:
    - product_family: Switches and Hubs
    template_content: "{% raw %}! Adds multiple L3 Interfaces to a Switch\n!\n{% set\
      \ MASK_PFX = {\"255.255.255.255\": \"/32\", \"255.255.255.254\": \"/31\", \"\
      255.255.255.252\": \"/30\", \"255.255.255.248\": \"/29\", \"255.255.255.240\"\
      : \"/28\", \"255.255.255.224\": \"/27\", \"255.255.255.192\": \"/26\", \"255.255.255.128\"\
      : \"/25\", \"255.255.255.0\": \"/24\", \"255.255.254.0\": \"/23\", \"255.255.252.0\"\
      : \"/22\", \"255.255.248.0\": \"/21\", \"255.255.2.0\": \"/22\", \"255.255.224.0\"\
      : \"/19\", \"255.255.192.0\": \"/18\", \"255.255.128.0\": \"/17\", \"255.255.0.0\"\
      : \"/16\", \"255.254.0.0\": \"/15\", \"255.252.0.0\": \"/14\", \"255.248.0.0\"\
      : \"/13\", \"255.240.0.0\": \"/12\", \"255.224.0.0\": \"/11\", \"255.192.0.0\"\
      : \"/10\", \"255.128.0.0\": \"/9\", \"255.0.0.0\": \"/8\", \"254.0.0.0\": \"\
      /7\", \"252.0.0.0\": \"/6\", \"248.0.0.0\": \"/5\", \"240.0.0.0\": \"/4\", \"\
      224.0.0.0\": \"/3\", \"192.0.0.0\": \"/2\", \"128.0.0.0\": \"/1\", \"0.0.0.0\"\
      : \"/0\"} %}\n!\n{% for INTF in INTFS|split(\";\") %}\n  {% set looper = loop.index0\
      \ %}\ninterface {{INTF}}\n  {% for DESC in DESCS|split(\";\") %}\n    {% if\
      \ loop.index0 == looper %}\n description {{DESC}}\n    {% endif %}\n  {% endfor\
      \ %}\n no shutdown\n no switchport\n  {% for IP in IPS|split(\";\") %}\n   \
      \ {% if loop.index0 == looper %}\n      {% set ADDR = IP.split(\"/\")[0] %}\n\
      \      {% set BITS = \"/\" + IP.split(\"/\")[1] %}\n      {% for mask, cidr\
      \ in MASK_PFX.items() %}\n        {% if cidr == BITS %}\n          {% set output_mask\
      \ = mask %}\n ip address {{ADDR}} {{output_mask}}\n        {% endif %}\n   \
      \   {% endfor %}\n    {% endif %}\n  {% endfor %}\n!\n{% endfor %}\n{% endraw\
      \ %}"
    template_tag:
    - id: 25437cdf-e34b-4adc-83b4-a4883da25e02
      name: Add L3 Interface
