- configuration_templates:
    template_name: Copy of InterfacesGF_2191211730174
    template_description: Used to create interfaces for Branches Globally
    project_name: RBC_Template_Blocks
    author: admin
    language: VELOCITY
    composite: false
    software_type: IOS-XE
    custom_params_order: false
    device_types:
    - product_family: Switches and Hubs
    template_content: "#if($STACK_TYPE == '1x24')\n! Stack Type is 1x24 port\n\n#elseif($STACK_TYPE\
      \ == '1x48')\n! Stack Type is 1x48 port\n\n#elseif($STACK_TYPE == '2x24')\n\
      ! Stack Type is 2x24 port\n\n#elseif($STACK_TYPE == '2x48')\n! Stack Type is\
      \ 2x48 port\n\n#elseif($STACK_TYPE == '1x48+1x24')\n! Stack Type is 1x48 port\
      \ and 1x24 port\n\n#elseif($STACK_TYPE == '2x48+1x24')\n! Stack Type is 2x48\
      \ port and 1x24\n\n#elseif($STACK_TYPE == '3x48')\n! Stack Type is 3x48 port\n\
      \n#elseif($STACK_TYPE == '3x48+1x24')\n! Stack Type is 3x48 port and 1x24 port\n\
      \n#else($STACK_TYPE == '4x48')\n! Stack Type is 4x48 port\n\n#end\n\n#if ($STACK_TYPE\
      \ == '1x24')\ninterface range gi 1/0/1 - 24\n description I,\n\ninterface range\
      \ gi 1/0/2 - 24\n description I,\n shut\n#end\n\n#if ($STACK_TYPE == '1x48')\n\
      interface range gi 1/0/2 - 48\n description I,\n\ninterface range gi 1/0/2 -\
      \ 48\n description I,\n shut\n#end\n\n#if ($STACK_TYPE == '2x24')\n\ninterface\
      \ range gi 1/0/1 - 24, gi 2/0/1 -24\n description I,\n\ninterface range gi 1/0/2\
      \ - 24, gi 2/0/2 -24\n description I,\n shut\n#end\n\n#if ($STACK_TYPE == '1x48+1x24')\n\
      interface range gi 1/0/1 - 48, gi 2/0/1 -24\n description I,\n\ninterface range\
      \ gi 1/0/2 - 48, gi 2/0/2 -24\n description I,\n shut\n#end\n\n#if ($STACK_TYPE\
      \ == '2x48')\ninterface range gi 1/0/1 - 48, gi 2/0/1 -48\n description I,\n\
      \ninterface range gi 1/0/2 - 48, gi 2/0/2 -48\n description I,\n shut\n#end\n\
      \n#if ($STACK_TYPE == '2x48+1x24')\ninterface range gi 1/0/1 - 48, gi 2/0/1\
      \ -48, gi 3/0/1 - 24\n description I,\n\ninterface range gi 1/0/2 - 48, gi 2/0/2\
      \ -48, gi 3/0/1 - 24\n description I,\n shut\n#end\n\n#if ($STACK_TYPE == '3x48')\n\
      interface range gi 1/0/1 - 48, gi 2/0/1 -48, gi 3/0/1 - 48\n description I,\n\
      \ninterface range gi 1/0/2 - 48, gi 2/0/2 -48, gi 3/0/1 - 48\n description I,\n\
      \ shut\n#end\n\n#if ($STACK_TYPE == '3x48+1x24')\ninterface range gi 1/0/1 -\
      \ 48, gi 2/0/1 -48, gi 3/0/1 - 48, gi 4/0/1 - 24\n description I,\n\ninterface\
      \ range gi 1/0/2 - 48, gi 2/0/2 -48, gi 3/0/1 - 48, gi 4/0/1 - 24\n description\
      \ I,\n shut\n#end\n\n#if ($STACK_TYPE == '4x48')\ninterface range gi 1/0/1 -\
      \ 48, gi 2/0/1 -48, gi 3/0/1 - 48, gi 4/0/1 - 48\n description I,\n\ninterface\
      \ range gi 1/0/2 - 48, gi 2/0/2 -48, gi 3/0/1 - 48, gi 4/0/1 - 48\n description\
      \ I,\n shut\n#end \n\n#if ($LOCATION == 'CANADA')\n!LOCATION IS CANADA\n\n#elseif\
      \ ($LOCATION == 'US')\n!LOCATION IS US\n\n#else ($LOCATION == \"CARIBBEAN\"\
      )\n!LOCATION IS CARIBBEAN\n#end\n\nip dhcp snooping\nip dhcp snooping vlan 2\n\
      no ip dhcp snooping information option\n\n#if ($INTERFACE_TRUNK == true)\n!INTERFACE_TRUNK_Section\
      \ FOR GLOBAL\n\n#if ($STACK_TYPE == '1x24' || $STACK_TYPE == '1x48')\ndefault\
      \ interface range GigabitEthernet1/0/1,GigabitEthernet1/0/2 \ninterface range\
      \ GigabitEthernet1/0/1,GigabitEthernet1/0/2\n\n#elseif ($STACK_TYPE == '2x24'\
      \ || $STACK_TYPE == '2x48' || $STACK_TYPE == '1x48+1x24' || $STACK_TYPE == '2x48+1x24'\
      \ || $STACK_TYPE == '3x48' || $STACK_TYPE == '3x48+1x24' || $STACK_TYPE == '4x48')\n\
      default interface range GigabitEthernet1/0/1,GigabitEthernet2/0/1\ninterface\
      \ range GigabitEthernet1/0/1,GigabitEthernet2/0/1\n#end \n\ndescription I,Uplink\
      \ to WAN1 Edge\nswitchport trunk allowed vlan 2,6,21,25,99,195,197,505,605\n\
      switchport trunk native vlan 999\nswitchport mode trunk\nswitchport nonegotiate\n\
      power inline never\nspeed auto 100 1000\nservice-policy input INGRESS_QOS\n\
      service-policy output EGRESS_QOS\nip dhcp snooping trust\nno shut\n\ninterface\
      \ range GigabitEthernet1/0/2 \ndescription I,Uplink to WAN2 Edge\n\n#if ($STACK_TYPE\
      \ == '2x24' || $STACK_TYPE == '2x48' || $STACK_TYPE == '1x48+1x24' || $STACK_TYPE\
      \ == '2x48+1x24' || $STACK_TYPE == '3x48' || $STACK_TYPE == '3x48+1x24' || $STACK_TYPE\
      \ == '4x48')\ninterface GigabitEthernet2/0/1\ndescription I,Uplink to WAN2 Edge\n\
      #end \n\n#end\n\n\n\n\n\n!CANADA SECTION BEGINS\n\n#if ($INTERFACE_SERVER ==\
      \ true and $LOCATION == 'CANADA')\n! INTERFACE_SERVER_Section for CANADA\n\n\
      #if ($STACK_TYPE == '1x24' || $STACK_TYPE == '1x48')\ndefault interface range\
      \ GigabitEthernet1/0/3,GigabitEthernet1/0/22\ninterface range GigabitEthernet1/0/3,GigabitEthernet1/0/22\n\
      \n#elseif ($STACK_TYPE == '2x24' || $STACK_TYPE == '2x48' || $STACK_TYPE ==\
      \ '1x48+1x24' || $STACK_TYPE == '2x48+1x24' || $STACK_TYPE == '3x48' || $STACK_TYPE\
      \ == '3x48+1x24' || $STACK_TYPE == '4x48')\ndefault interface range GigabitEthernet1/0/2,GigabitEthernet1/0/3,GigabitEthernet2/0/9\n\
      interface range GigabitEthernet1/0/2,GigabitEthernet1/0/3,GigabitEthernet2/0/9\n\
      #end \n\ndescription SVxx:BRANCH SERVER NIC1\nswitchport access vlan 2\nswitchport\
      \ mode access\nswitchport nonegotiate\npower inline never\nspanning-tree bpduguard\
      \ enable\nspanning-tree portfast\nspeed 100\nduplex full\nservice-policy input\
      \ INGRESS_QOS\nservice-policy output EGRESS_QOS\nip dhcp snooping trust\nno\
      \ cdp enable\nno snmp trap link-status\nno keepalive\nno shut\n\ninterface range\
      \ GigabitEthernet1/0/22\ndescription SVxx:BRANCH SERVER RSA\n\n#if ($STACK_TYPE\
      \ == '2x24' || $STACK_TYPE == '2x48' || $STACK_TYPE == '1x48+1x24' || $STACK_TYPE\
      \ == '2x48+1x24' || $STACK_TYPE == '3x48' || $STACK_TYPE == '3x48+1x24' || $STACK_TYPE\
      \ == '4x48')\ninterface GigabitEthernet2/0/9\ndescription SVxx: BRANCH SERVER\
      \ NIC2\n\ninterface GigabitEthernet1/0/2\ndescription SVxx: BRANCH SERVER RSA\n\
      #end \n\n#end \n\n#if ($INTERFACE_ATM == true and $LOCATION == 'CANADA')\n!\
      \ INTERFACE_ATM_Section FOR CANADA\n\n#if ($STACK_TYPE == '1x24' || $STACK_TYPE\
      \ == '1x48')\ndefault interface range GigabitEthernet 1/0/4 - 5\ninterface range\
      \ GigabitEthernet 1/0/4 - 5\n\n#elseif ($STACK_TYPE == '2x24')\ndefault interface\
      \ range GigabitEthernet 1/0/5,GigabitEthernet2/0/5\ninterface range GigabitEthernet\
      \ 1/0/5,GigabitEthernet2/0/5\n\n#elseif ($STACK_TYPE == '2x48' || $STACK_TYPE\
      \ == '1x48+1x24' || $STACK_TYPE == '2x48+1x24' || $STACK_TYPE == '3x48' || $STACK_TYPE\
      \ == '3x48+1x24' || $STACK_TYPE == '4x48')\ndefault interface range GigabitEthernet\
      \ 1/0/4 - 5,GigabitEthernet2/0/4 - 5\ninterface range GigabitEthernet 1/0/4\
      \ - 5,GigabitEthernet2/0/4 - 5\n#end\n\ndescription I,ATM\nswitchport access\
      \ vlan 6\nswitchport mode access\npower inline never\nno cdp enable\nno keepalive\n\
      spanning-tree portfast\nspanning-tree bpduguard enable\nservice-policy input\
      \ INGRESS_QOS\nservice-policy output EGRESS_QOS\nip dhcp snooping limit rate\
      \ 15\nno snmp trap link-status\nno shut\n#end\n\n#if ($INTERFACE_AP == true\
      \ and $LOCATION == 'CANADA')\n! INTERFACE_AP_Section FOR CANADA\n\n#if ($STACK_TYPE\
      \ == '1x24')\ndefault interface range GigabitEthernet 1/0/6 - 8\ninterface range\
      \ GigabitEthernet 1/0/6 - 8\n\n#elseif ($STACK_TYPE == '1x48')\ndefault interface\
      \ range GigabitEthernet 1/0/6 - 10\ninterface range GigabitEthernet 1/0/6 -\
      \ 10\n\n#elseif ($STACK_TYPE == '2x24')\ndefault interface range GigabitEthernet\
      \ 1/0/6 - 7,GigabitEthernet2/0/6 - 8\ninterface range GigabitEthernet 1/0/6\
      \ - 7,GigabitEthernet2/0/6 - 8\n\n#elseif ($STACK_TYPE == '2x48' || $STACK_TYPE\
      \ == '1x48+1x24' || $STACK_TYPE == '2x48+1x24' || $STACK_TYPE == '3x48' || $STACK_TYPE\
      \ == '3x48+1x24' || $STACK_TYPE == '4x48')\ndefault interface range GigabitEthernet\
