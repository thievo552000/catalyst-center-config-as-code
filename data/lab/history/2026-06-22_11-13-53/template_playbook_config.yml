      \ tcp any eq ftp-data any\n permit tcp any eq ftp any\n permit tcp any any eq\
      \ 554\n permit tcp any eq 554 any\n permit tcp any any eq 1935\n permit tcp\
      \ any eq 1935 any\n permit 97 any any\n remark GRE For Guest Wireless\n permit\
      \ 47 any any\n\nip access-list extended CS_2_ACL\n remark ILX\n permit udp any\
      \ eq 3900 any\n permit udp any eq 3960 any\n permit udp any any eq 3900\n permit\
