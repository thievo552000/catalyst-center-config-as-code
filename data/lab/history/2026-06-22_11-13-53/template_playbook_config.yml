      \ name MULTICAST_ACL\nclass-map PHONE_SIGNAL\n  match access-group name PHONE_SIGNAL_ACL\n\
      class-map PHONE_MEDIA\n  match access-group name PHONE_MEDIA_ACL\nclass-map\
      \ VIDEO_SIGNAL\n  match access-group name VIDEO_SIGNAL_ACL\nclass-map VIDEO_MEDIA\n\
      \  match access-group name VIDEO_MEDIA\nclass-map WM_WAVE_HOOT\n  match access-group\
      \ name WM_WAVE_HOOT\nclass-map UDP\n  match access-group name UDP_ACL\nclass-map\
      \ AF_11\n match access-group name AF_11_ACL\nclass-map AF_21\n match access-group\
      \ name AF_21_ACL\nclass-map AF_31\n match access-group name AF_31_ACL\nclass-map\
      \ CS_1\n match access-group name CS_1_ACL\nclass-map CS_2\n match access-group\
      \ name CS_2_ACL\nclass-map AVAMAR_TSM_USER\n match access-group name AVAMAR_TSM_USER_ACL\n\
      \ \nclass-map match-any REALTIME\n match dscp cs4 ef\nclass-map match-any CONTROL\n\
      \ match dscp cs3 cs6 cs7 \nclass-map match-any PRIORITY\n match dscp af31\n\
      class-map match-any TRANSACTIONAL\n match dscp af21\nclass-map match-any PRIORITY_BULK\n\
      \ match dscp cs2\nclass-map match-any BULK\n match dscp af11\nclass-map match-any\
      \ LOW_PRIORITY_BULK\n match dscp cs1\n  \ntable-map MARKDOWN\n map from 24 to\
      \ 0\n map from 32 to 0\n map from 46 to 0\n default copy\n\npolicy-map INGRESS_QOS\n\
      \ class PHONE_SIGNAL\n  police 32000 bc 6000\n   conform-action transmit \n\
      \   exceed-action set-dscp-transmit dscp table MARKDOWN\n class PHONE_MEDIA\n\
      \  police 448000 bc 84000\n   conform-action transmit \n   exceed-action set-dscp-transmit\
      \ dscp table MARKDOWN\n class MULTICAST\n  police 256000 bc 48000 conform-action\
      \ transmit exceed-action drop\n class VIDEO_SIGNAL\n  police 128000 bc 24000\n\
      \   conform-action transmit \n   exceed-action set-dscp-transmit dscp table\
      \ MARKDOWN\n Class VIDEO_MEDIA\n  police 1536000 bc 288000\n   conform-action\
      \ transmit \n   exceed-action set-dscp-transmit dscp table MARKDOWN\n class\
      \ WM_WAVE_HOOT\n  set dscp ef\n class AF_31\n  set dscp af31\n class AF_21\n\
      \  set dscp af21\n class AF_11\n  set dscp af11\nclass AVAMAR_TSM_USER\n  set\
      \ dscp af12\nclass CS_2\n  set dscp cs2\nclass CS_1\n  set dscp cs1\n\npolicy-map\
      \ EGRESS_QOS\n class REALTIME\n    priority level 1\n     police rate percent\
      \ 30    \n      conform-action transmit     \n      exceed-action drop\n class\
      \ CONTROL\n   bandwidth remaining percent 4\n   queue-buffers ratio 10\n   queue-limit\
      \ dscp  cs3 percent 90\n   queue-limit dscp  cs6 percent 100\n   queue-limit\
      \ dscp  cs7 percent 100\nclass PRIORITY\n  bandwidth remaining percent 25\n\
      \  queue-buffers ratio 10\n class PRIORITY_BULK\n  bandwidth remaining percent\
      \ 10 \n  queue-buffers ratio 10\nclass TRANSACTIONAL\n  bandwidth remaining\
      \ percent 10\n  queue-buffers ratio 10\n class BULK\nbandwidth remaining percent\
      \ 13\n  queue-buffers ratio 10\n class LOW_PRIORITY_BULK\n bandwidth remaining\
      \ percent 5\n  queue-buffers ratio 10\n class class-default\n  bandwidth remaining\
      \ percent 23\n  queue-buffers ratio 25  \n\n"
