- configuration_templates:
    template_name: Multicast Overlay
    project_name: Citi Jinja v21.2.1
    language: JINJA
    composite: false
    software_type: IOS-XE
    custom_params_order: true
    device_types:
    - product_family: Switches and Hubs
    template_content: "{% raw %}! Applies Global/Regional/Local RP Mappings to the\
      \ Overlay\n!\n! Jinja Bug\n!\n! {{VN}}\n! {{GLOBAL_RP}}\n! {{LOCAL_RP}}\n! {{REGION}}\n\
      ! {{LOCAL_MC_WILDCARD}}\n! {{PEERS}}\n! {{PEER_ASNS}}\n! {{IS_LOCAL_RP}}\n!\
      \ {{BGP_ASN}}\n! {{ACE_LIST}}\n! {{LO_IP}}\n! {{LO_AGG}}\n! {{DEPLOY_OVERLAY_MC}}\n\
      !\n{% if DEPLOY_OVERLAY_MC == \"Yes\" %}\n#MODE_ENABLE\ntclsh\nios_config \"\
      interface Loopback[lindex [split [lindex [exec \"show ip vrf | include {{VN}}\"\
      ] 1] \":\"] 1]\" \"vrf forwarding {{VN}}\" \"ip address {{LO_IP}} 255.255.255.255\"\
      \ \"ip pim sparse-mode\"\ntclquit\n#MODE_END_ENABLE\n!\n#MODE_ENABLE\ntclsh\n\
      ios_config \"interface LISP0.[lindex [split [lindex [exec \"show ip vrf | include\
      \ {{VN}}\"] 1] \":\"] 1]\" \"ip pim lisp transport multicast\" \"ip pim lisp\
      \ core-group-range 232.0.0.1 1000\"\ntclquit\n#MODE_END_ENABLE\n!\nip multicast-routing\
      \ vrf {{VN}}\nip pim vrf {{VN}} rp-address {{GLOBAL_RP}} MST_RP-GLOBAL-{{REGION}}\
      \ override\n{% if LOCAL_RP != \"\" %}\nip pim vrf {{VN}} rp-address {{LOCAL_RP}}\
      \ MST_RP-Local override\n{% endif %}\n!\n#MODE_ENABLE\ntclsh\nios_config \"\
      ip pim vrf {{VN}} register-source Loopback[lindex [split [lindex [exec \"show\
      \ ip vrf | include {{VN}}\"] 1] \":\"] 1]\"\ntclquit\n#MODE_END_ENABLE\nip pim\
      \ vrf {{VN}} ssm default\n!\nip access-list standard MST_RP-GLOBAL-{{REGION}}\n\
      \ 10 remark ** permitted global multicast addresses **\n 10 permit 239.192.0.0\
      \ 0.0.255.255\n{% if REGION == \"NAM\" %}\n 20 remark ** permitted NAM regional\
      \ multicast addresses **\n 20 permit 239.197.0.0 0.0.255.255\n{% endif %}\n\
      {% if REGION == \"EMEA\" %}\n 20 remark ** permitted EMEA regional multicast\
      \ addresses **\n 20 permit 239.203.0.0 0.0.255.255\n{% endif %}\n{% if REGION\
      \ == \"APAC\" %}\n 20 remark ** permitted APAC regional multicast addresses\
      \ **\n 20 permit 239.201.240.0 0.0.15.255\n{% endif %}\n!\n{% if __device.role\
      \ == \"CORE\" %}\nrouter bgp {{BGP_ASN}}\n address-family ipv4 vrf {{VN}}\n\
      \  network {{LO_IP}} mask 255.255.255.255\n  aggregate-address {{LO_AGG}} summary-only\n\
      !\n{% endif %}\n{% if LOCAL_RP != \"\" %}\nip access-list standard MST_RP-Local\n\
      \ 10 remark ** assigned multicast addresses for local purpose **\n 10 permit\
      \ {{LOCAL_MC_WILDCARD}}\n!\n{% if IS_LOCAL_RP == \"Yes\" %}\ninterface Loopback10001\n\
      \ description Loopback for Local Anycast RP\n vrf forwarding {{VN}}\n ip address\
      \ {{LOCAL_RP}} 255.255.255.255\n no shutdown\n ip pim sparse-mode\n!\nrouter\
      \ bgp {{BGP_ASN}}\n address-family ipv4 vrf {{VN}}\n  network {{LOCAL_RP}} mask\
      \ 255.255.255.255\n!\n{% for PEER in PEERS.split(\";\") %}\n  {% set looper\
      \ = loop.index0 %}\n  {% for ASN in PEER_ASNS|split(\";\") %}\n    {% if loop.index0\
      \ == looper %}\nip msdp vrf {{VN}} peer {{PEER}} connect-source loopback10001\
      \ remote-as {{ASN}}\n    {% endif %}\n  {% endfor %}\nip msdp vrf {{VN}} mesh-group\
      \ MESH {{PEER}} \nip msdp vrf {{VN}} sa-filter in {{PEER}} list LOCAL_SA_LIST\n\
      ip msdp vrf {{VN}} sa-filter out {{PEER}} list LOCAL_SA_LIST\n!\n{% endfor %}\n\
      ip msdp vrf {{VN}} cache-sa-state\n!\n! ACL for Allowed SA Advertisements\n\
      !\nip access-list extended LOCAL_SA_LIST\n{% for ACE in ACE_LIST.split(\";\"\
      ) %}\n permit ip {{ACE}}\n{% endfor %}\n!\n{% endif %}\n{% endif %}\n{% else\
      \ %}\n! do something\nline con 0\n logging synchronous\n!\n{% endif %}{% endraw\
      \ %}"
    template_tag:
    - id: e6d7b792-7cdb-44e4-943b-55e28d8d1dad
      name: Multicast Overlay
