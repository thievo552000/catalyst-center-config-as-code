      \ == '1x48' %}\ndefault interface range GigabitEthernet 1/0/6 - 9\ninterface\
      \ range GigabitEthernet 1/0/6 - 9\n\n{% elif STACK_TYPE == '2x24' %}\ndefault\
      \ interface range GigabitEthernet 1/0/6 - 7,GigabitEthernet2/0/6 - 8\ninterface\
      \ range GigabitEthernet 1/0/6 - 7,GigabitEthernet2/0/6 - 8\n\n{% elif STACK_TYPE\
      \ == '2x48' || STACK_TYPE == '1x48+1x24' || STACK_TYPE == '2x48+1x24' || \n\
      STACK_TYPE == '3x48' || STACK_TYPE == '3x48+1x24' || STACK_TYPE == '4x48' %}\n\
      default interface range GigabitEthernet 1/0/6 - 8,GigabitEthernet 2/0/6 - 8\n\
      interface range GigabitEthernet 1/0/6 - 8,GigabitEthernet 2/0/6 - 8\n{% endif\
      \ %}\n\n{{ap_port()}}\n\n{% endif %}\n\n{% if ADD_NAC_CONFIG != true %}\n\n\
      {% elif LOCATION == 'CARIBBEAN' %} \n{{nac_US_CAR()}}\n\n{% endif %}\n\n! INTERFACE_USER_Section\
      \ FOR CARIBBEAN\n{% if ADD_INTERFACE_USER == true and LOCATION == 'CARIBBEAN'\
      \ %} \n\n{% if STACK_TYPE == '1x24' %}\ninterface range GigabitEthernet 1/0/9\
      \ - 21, GigabitEthernet1/0/23 - 24\n\n{% elif STACK_TYPE == '1x48' %}\ninterface\
      \ range Gi1/0/11 - 21, GigabitEthernet1/0/23 - 48\n\n{% elif STACK_TYPE == '2x24'\
      \ %}\ninterface range Gi1/0/8 - 24, Gi2/0/10 - 24\n\n{% elif STACK_TYPE == '1x48+1x24'\
      \ %}\ninterface range Gi1/0/9 - 48, Gi2/0/10 - 24\n\n{% elif STACK_TYPE == '2x48'\
      \ %}\ninterface range Gi1/0/9 - 48, Gi2/0/10 - 48\n\n{% elif STACK_TYPE == '2x48+1x24'\
      \ %}\ninterface range Gi1/0/9 - 48, Gi2/0/10 - 48, Gi3/0/1 - 24\n\n{% elif STACK_TYPE\
      \ == '3x48' %}\ninterface range Gi1/0/9 - 48, Gi2/0/10 - 48, Gi3/0/1 - 48\n\n\
      {% elif STACK_TYPE == '3x48+1x24' %}\ninterface range Gi1/0/9 - 48, Gi2/0/10\
      \ - 48, Gi3/0/1 - 48, Gi4/0/1 - 24\n\n{% elif STACK_TYPE == '4x48' %}\ninterface\
      \ range Gi1/0/9 - 48, Gi2/0/10 - 48, Gi3/0/1 - 48, Gi4/0/1 - 48\n{% endif %}\n\
      \n{{branch_LAN()}} \n{{interface_NAC()}} \n\n{% endif %}\n\n\n! CARIBBEAN SECTION\
      \ ENDS\n\n\n\n\n\n! US SECTION BEGINS\n\n{% if ADD_INTERFACE_SERVER == true\
      \ and LOCATION == 'US' %}\n! INTERFACE_SERVER_Section for US\n\n{% if STACK_TYPE\
