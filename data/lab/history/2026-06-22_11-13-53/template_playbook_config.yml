      \ GigabitEthernet 2/0/3\n{{tyco_DMP()}}\n\n{% endif %}\n\n{% endif %}\n\n\n\
      ! CANADA SECTION ENDS\n\n\n\n\n\n! CARIBBEAN SECTION BEGINS\n\n{% if ADD_INTERFACE_SERVER\
