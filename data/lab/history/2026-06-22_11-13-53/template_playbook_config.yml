- configuration_templates:
    template_name: Configure SGT Inline Tagging
    project_name: Citi Jinja v21.2.1
    language: JINJA
    composite: false
    software_type: IOS-XE
    custom_params_order: true
    device_types:
    - product_family: Switches and Hubs
    template_content: "{% raw %}!\n! This template adds support for inline tagging\
      \ of SGT values\n!\n{% if INTERFACES != \"\" %}\n{% for INTF in INTERFACES %}\n\
      interface {{INTF}}\n cts manual\n  propagate sgt\n  policy static sgt 2 trusted\n\
      !\n{% endfor %}\n{% endif %}\n! Jinja bugs\nline con 0\n logging synchronous\n\
      !\n{% endraw %}"
    template_tag:
    - id: 17a07319-8c44-4acf-8fcf-04098f49b280
      name: SGT Inline Tagging v21.2.1
- configuration_templates:
    template_name: Control Plane NMR
    project_name: Citi Jinja v21.2.1
    language: JINJA
    composite: false
    software_type: IOS-XE
    custom_params_order: false
    device_types:
    - product_family: Switches and Hubs
    template_content: '{% raw %}! Remove aggregates from standalone CP

      ! Prevents the NMT TTL race condition

      !

      ! Identify current aggregates and save to a text file for the BNs

      #MODE_ENABLE

      tclsh

      puts [open "border_node_nmr.txt" w+] [string range [exec "sh run | i (ro.*bg)|(a.*-f.*pv4)|(agg.*only)"]
      [string first "router" [exec "sh run | i (ro.*bg)|(a.*-f.*pv4)|(agg.*only)"]]
      end]

      tclquit

      #MODE_END_ENABLE

      !

      ! Identify current aggregates and save to a text file with the no format

      #MODE_ENABLE

      tclsh

      puts [open "control_plane_nmr.txt" w+] [string map {aggregate-address "no aggregate-address"}
      [string range [exec "sh run | i (ro.*bg)|(a.*-f.*pv4)|(agg.*only)"] [string
      first "router" [exec "sh run | i (ro.*bg)|(a.*-f.*pv4)|(agg.*only)"]] end]]

      tclquit

      #MODE_END_ENABLE

      !

      ! Remove current aggregates and remove the text file

      #MODE_ENABLE

      #INTERACTIVE

      copy control_plane_nmr.txt system:running-config<IQ>run<R>running-config

      #END_INTERACTIVE

      delete /force control_plane_nmr.txt

      #MODE_END_ENABLE

      !

      {% endraw %}'
