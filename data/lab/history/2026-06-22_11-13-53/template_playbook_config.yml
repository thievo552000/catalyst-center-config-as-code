- configuration_templates:
    template_name: PNP Seed Device
    project_name: Citi Jinja v21.2.1
    language: JINJA
    composite: false
    software_type: IOS-XE
    custom_params_order: true
    device_types:
    - product_family: Switches and Hubs
    template_content: "{% raw %}! Adds and Removes the Seed Node Functionality\n!\n\
      ! Jinja bug\n! {{BGP_ASN}}\n! {{Loops}}\n! {{NETWORK}}\n! {{DIRECTION}}\n! {{PNP_VLAN}}\n\
      ! {{INTFS}}\n! {{P2P_MASK}}\n! {{DFGW}}\n! {{CAMPUS_SIZE}}\n! option 43 ascii\
      \ \"5A1N;B1;K4;I{{DNAC_DR_VIP}};J80\"\n! {{__dnsserver[0].domainName}}\n! {{__dnsserver[0].primaryIpAddress}}\n\
      !\n! DNAC IP Address: {{DNAC_DR_VIP}}\n! This should be the DR Enterprise VIP\
      \ for DR deployments and the HA VIP for non-DR deployments.\n!\n{% set DIRECT_CONNECT\
      \ = 0 %}\n{% if __device.role == \"DISTRIBUTION\" %}\n{% set DIRECT_CONNECT\
      \ = 1 %}\n{% endif %}\n{% if CAMPUS_SIZE == \"Medium\" %}\n{% set DIRECT_CONNECT\
      \ = 1 %}\n{% endif %}\n! Direct Connect = {{DIRECT_CONNECT}}\n!\n{% if DIRECTION\
      \ == \"Add PNP Support\" %}\n{% if DIRECT_CONNECT > 0 %}\n! Save the current\
      \ physical interface config to restore\nvlan {{PNP_VLAN}}\n name PNP\n!\nexit\n\
      {% for PHYS_INT in INTFS %}\n{% set INTF_NAME = PHYS_INT %}\n{% set INTF_NAME\
      \ = INTF_NAME.replace(\"/\",\".\") %}\n#MODE_ENABLE\ntclsh\nputs [open \"PNP_{{INTF_NAME}}.txt\"\
      \ w+] [exec \"show run interface {{PHYS_INT}} | section interface\"]\ntclquit\n\
      #MODE_END_ENABLE\n!\ndefault interface {{PHYS_INT}}\ninterface {{PHYS_INT}}\n\
      \ description Configured by DNAC for Downstream PNP Support\n switchport\n switchport\
      \ mode trunk\n switchport trunk allowed vlan 1,{{PNP_VLAN}}\n! switchport trunk\
      \ native vlan {{PNP_VLAN}}\n no shutdown\n!\nexit\n{% endfor %}\n!\n!\nip dhcp\
      \ excluded-address {{DFGW}}\nip dhcp pool PNP_POOL\n network {{NETWORK}} {{P2P_MASK}}\n\
      \ default-router {{DFGW}}\n! if DNAC_OPTION == \"Hostname\" \n option 43 ascii\
      \ \"5A1N;B1;K4;I{{DNAC_DR_VIP}}.{{__dnsserver[0].domainName}};J80\"\n!else\n\
      ! IPv4 Option\n! option 43 ascii \"5A1N;B2;K4;I{{DNAC_DR_VIP}};J80\"\n!endif\n\
      \ domain-name {{__dnsserver[0].domainName}}\n dns-server {{__dnsserver[0].primaryIpAddress}}\n\
      !\npnp startup-vlan {{PNP_VLAN}}\n!\ninterface vlan {{PNP_VLAN}}\n description\
      \ PNP Onboarding\n ip address {{DFGW}} {{P2P_MASK}}\n no shutdown\n!\nrouter\
      \ ospf {{BGP_ASN}}\n no passive-interface vlan{{PNP_VLAN}}\n!\n{% endif %}\n\
      {% if __device.role == \"CORE\" %}\nrouter bgp {{BGP_ASN}}\n address-family\
      \ ipv4\n  network {{NETWORK}} mask {{P2P_MASK}}\n{% for ADDR in Loops.split(\"\
      ;\") %}\n  network {{ADDR}} mask 255.255.255.255\n{% endfor %}\n!\n{% endif\
      \ %}\n{% else %}\n!\n{% if __device.role == \"CORE\" %}\nrouter bgp {{BGP_ASN}}\n\
      \ address-family ipv4\n  no network {{NETWORK}} mask {{P2P_MASK}}\n!\n{% endif\
      \ %}\n{% if DIRECT_CONNECT > 0 %}\n! regular Jinja config\nno ip dhcp excluded-address\
      \ {{DFGW}}\nno ip dhcp pool PNP_POOL\nno pnp startup-vlan {{PNP_VLAN}}\nno interface\
      \ vlan {{PNP_VLAN}}\nno vlan {{PNP_VLAN}}\n!\n{% for PHYS_INT in INTFS %}\n\
      default interface {{PHYS_INT}}\n{% endfor %}\n!\n! Recover the original physical\
      \ interface config \n{% for PHYS_INT in INTFS %}\n{% set INTF_NAME = PHYS_INT\
      \ %}\n{% set INTF_NAME = INTF_NAME.replace(\"/\",\".\") %}\n!\n#MODE_ENABLE\n\
      #INTERACTIVE\ncopy PNP_{{INTF_NAME}}.txt system:running-config<IQ>run<R>running-config\n\
      #END_INTERACTIVE\ndelete /force PNP_{{INTF_NAME}}.txt\n#MODE_END_ENABLE\n{%\
      \ endfor %}\n{% endif %}\n{% endif %}\n{% endraw %}"
    template_tag:
    - id: 5d1c3626-62e6-434f-bd8f-4a5b04a0ea0f
      name: PNP Seed Device
