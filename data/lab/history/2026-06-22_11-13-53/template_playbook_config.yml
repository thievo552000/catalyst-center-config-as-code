      \ {{Staging_Username}} RO 15 ##}\n{## + ##}\n{## +{% if Shutdown_Unused_Ports\
      \ == false %} ##}\n{## +! I confirm that no unused infrastructure ports need\
      \ to be shutdown. Otherwise, select interfaces from the list ##}\n{## + ##}\n\
      {## +end ##}\n{## + ##}\n{## +{% elif Shutdown_Unused_Ports == true %} ##}\n\
      {## +! allow TAs to select mulitple unused infrastructure ports as these ports\
      \ do not have NAC enabled ##}\n{## +! make sure list of interfaces to be shutdown\
      \ is showing in the Simulation ##}\n{## + ##}\n{## +interface range {{Select_Interfaces_to_Shutdown}}\
      \ ##}\n{## + shutdown ##}\n{## +  ##}\n{## +end ##}\n{## + ##}\n{## +{% endif\
      \ %} ##}\n{## + ##}\n{## +  ##}\n{## \\ No newline at end of file ##}#INTERACTIVE\n\
      \  no username {{Staging_Username}}<IQ>confirm<R>y\n#ENDS_INTERACTIVE\n\n  no\
      \ snmp-server community {{Staging_Username}} RO 15\n\n{% if Shutdown_Unused_Ports\
      \ == false %}\n! I confirm that no unused infrastructure ports need to be shutdown.\
      \ Otherwise, select interfaces from the list\n\nend\n\n{% elif Shutdown_Unused_Ports\
      \ == true %}\n! allow TAs to select mulitple unused infrastructure ports as\
      \ these ports do not have NAC enabled\n! make sure list of interfaces to be\
      \ shutdown is showing in the Simulation\n\ninterface range {{Select_Interfaces_to_Shutdown}}\n\
      \ shutdown\n \nend\n\n{% endif %}\n\n{% endraw %}"
