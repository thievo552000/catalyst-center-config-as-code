      \n{% elif STACK_TYPE == '2x24' || STACK_TYPE == '2x48' || STACK_TYPE == '1x48+1x24'\
      \ || STACK_TYPE == '2x48+1x24' || \nSTACK_TYPE == '3x48' || STACK_TYPE == '3x48+1x24'\
      \ || STACK_TYPE == '4x48' %}\ndefault interface range GigabitEthernet1/0/2,GigabitEthernet1/0/3,GigabitEthernet2/0/9\n\
