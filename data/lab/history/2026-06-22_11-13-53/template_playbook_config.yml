- configuration_templates:
    template_name: NetFlow
    project_name: Citi Jinja v21.2.1
    language: JINJA
    composite: false
    software_type: IOS-XE
    custom_params_order: true
    device_types:
    - product_family: Switches and Hubs
    template_content: "{% raw %}! {{__device.series}}\n{% set LEGACY_MODEL = 0 %}\n\
      {% if __device.series == \"Cisco Catalyst 4500 Series Switches\" %}\n{% set\
      \ LEGACY_MODEL = 1 %}\n{% endif %}\n{% if __device.series == \"Cisco Catalyst\
      \ 3650 Series Switches\" %}\n{% set LEGACY_MODEL = 1 %}\n{% endif %}\n!\n{%\
      \ if LEGACY_MODEL > 0 %}\nflow record dnacrecord\n match ipv4 protocol\n ! creating\
      \ a legacy flow record to get something\n match ipv4 source address\n match\
      \ ipv4 destination address\n collect counter bytes long\n collect counter packets\
      \ long\n{% if __device.series == \"Cisco Catalyst 4500 Series Switches\" %}\n\
      \ match ipv4 dscp\n collect application name\n{% endif %}\n!\nflow exporter\
      \ dnacexporter\n destination {{__netflowcollector[0].ipAddress}}\n source {{NetFlowSrc}}\n\
      \ transport udp 6007\n export-protocol ipfix\n option interface-table timeout\
      \ 10\n option sampler-table\n option application-table timeout 10\n option application-attributes\
      \ timeout 10\n!\nflow monitor dnacmonitor\n exporter dnacexporter\n cache timeout\
      \ inactive 10\n cache timeout active 60\n record dnacrecord\n!\n{% for INTF\
      \ in NetFlowInterfaces %}\ninterface {{INTF}}\n ip flow monitor dnacmonitor\
      \ in\n!\n{% endfor %}\n{% else %}\n! do something for Jinja\nline con 0\n logging\
      \ synchronous\n!\n{% endif %}{% endraw %}"
