- configuration_templates:
    template_name: IPsec 1 Branch for Cloud Router - System Default
    template_description: IPsec 1 Branch for Cloud Router - System Default
    project_name: Onboarding Configuration
    author: SYSTEM
    language: VELOCITY
    composite: false
    software_type: IOS-XE
    custom_params_order: false
    device_types:
    - product_family: Routers
      product_series: Cisco Cloud Services Router 1000V Series
    template_content: "!--- Crypto Config ---\ncrypto isakmp policy 200\nencr aes\n\
      authentication pre-share\ngroup 2\nlifetime 28800\ncrypto isakmp key cisco address\
      \ 0.0.0.0\ncrypto isakmp keepalive 10 10\n!\ncrypto ipsec security-association\
      \ replay window-size 1024\n!\ncrypto ipsec transform-set csr esp-aes esp-sha-hmac\n\
      mode tunnel\ncrypto ipsec df-bit clear\n!\ncrypto ipsec profile csr-prof\nset\
      \ transform-set csr\n!--- IPsec Tunnel Config ---\ninterface Tunnel11\nip address\
      \ $CloudRouterTunnelIpAddress $CloudRouterTunnelSubnetMask\ntunnel source GigabitEthernet1\n\
      tunnel destination $BranchRouterPublicIpAddress\ntunnel protection ipsec profile\
      \ csr-prof\ntunnel mode ipsec ipv4\nip mtu $mtu\nip tcp adjust-mss 1360\n!\n\
      interface Loopback100\nno ip address\n!\ninterface Loopback111\nip address $OspfRouterId\
      \ 255.255.255.255\n!--- BGP Config ---\nrouter bgp $AutonomousSystemNumber\n\
      bgp log-neighbor-changes\nneighbor $BranchRouterTunnelIP remote-as $NeighborBgpASN\n\
      !\naddress-family ipv4\nnetwork $OspfRouterId mask 255.255.255.255\n  #if(${CloudRouterSubnet1})\n\
      \  network $CloudRouterSubnet1 mask $CloudRouterSubnetMask1\n  #end\n  #if(${CloudRouterSubnet2})\n\
      \  network $CloudRouterSubnet2 mask $CloudRouterSubnetMask2\n  #end\nneighbor\
      \ $BranchRouterTunnelIP activate\n!"
    template_tag:
    - id: 6cd34421-4215-4e3a-846d-d472916fa62c
      name: cloud-ipsec-one-branch-router
