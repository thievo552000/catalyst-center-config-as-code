      \ 1/0/4 - 5\n\n{% elif STACK_TYPE == '2x24' %}\ndefault interface range GigabitEthernet\
      \ 1/0/4 - 5,GigabitEthernet2/0/4 - 5\ninterface range GigabitEthernet 1/0/4\
      \ - 5,GigabitEthernet2/0/4 - 5\n\n{% elif STACK_TYPE == '2x48' || STACK_TYPE\
      \ == '1x48+1x24' || STACK_TYPE == '2x48+1x24' || \nSTACK_TYPE == '3x48' || STACK_TYPE\
      \ == '3x48+1x24' || STACK_TYPE == '4x48' %}\ndefault interface range GigabitEthernet\
      \ 1/0/4 - 5,GigabitEthernet2/0/4 - 5\ninterface range GigabitEthernet 1/0/4\
