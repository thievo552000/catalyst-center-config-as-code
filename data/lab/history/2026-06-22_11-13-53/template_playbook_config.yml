- configuration_templates:
    template_name: DMVPN Hub for Cloud Router- System Default
    template_description: Dynamic Multipoint VPN Hub for Cloud Router
    project_name: Onboarding Configuration
    author: SYSTEM
    language: VELOCITY
    composite: false
    software_type: IOS-XE
    custom_params_order: false
    device_types:
    - product_family: Routers
      product_series: Cisco Cloud Services Router 1000V Series
    template_content: "!\nip vrf dmvpn\nrd $VrfDmvpnRouteDistinguisher\nroute-target\
      \ export $VrfDmvpnRouteTarget\nroute-target import $VrfDmvpnRouteTarget\n!\n\
      !--- Crypto Config ---\ncrypto keyring keyring-dmvpn\n  local-address GigabitEthernet1\n\
      \  pre-shared-key address 0.0.0.0 0.0.0.0 key cisco\n!\ncrypto isakmp policy\
      \ 200\nencr aes\nauthentication pre-share\ngroup 2\nlifetime 28800\ncrypto isakmp\
      \ keepalive 10 10\ncrypto isakmp profile dmvpn\n   keyring keyring-dmvpn\n \
      \  match identity address 0.0.0.0\n   local-address GigabitEthernet1\n!\ncrypto\
      \ ipsec security-association replay window-size 1024\n!\ncrypto ipsec transform-set\
      \ dmvpn esp-aes esp-sha-hmac\nmode transport\n!\ncrypto ipsec profile dmvpn-prof\n\
      set transform-set dmvpn\n!\n!--- DMVPN Tunnel Config ---\ninterface Loopback77\n\
      ip vrf forwarding dmvpn\nip address $OspfRouterId 255.255.255.255\n!\n!-- Tunnel11\
      \ is used for ip route with DNACenter as below ---\n!ip route DNACIpAddress\
      \ 255.255.255.255 Tunnel11\n!\ninterface Tunnel11\nip vrf forwarding dmvpn\n\
      ip address $TunnelIpAddress $TunnelSubnetMask\nno ip redirects\nip mtu $mtu\n\
      #if ( $isStandby == \"0\" )\n  ip nhrp map multicast $ActiveCloudRouterPublicIP\n\
      \  ip nhrp map $ActiveCloudRouterTunnelIP $ActiveCloudRouterPublicIP\n#end\n\
      ip nhrp network-id $NetworkId\n#if ( $isStandby == \"0\" )\n  ip nhrp nhs $ActiveCloudRouterTunnelIP\n\
      #end\nip tcp adjust-mss 1360\nbfd interval 100 min_rx 100 multiplier 3\ntunnel\
      \ source GigabitEthernet1\ntunnel mode gre multipoint\ntunnel key $TunnelKey\n\
      tunnel protection ipsec profile dmvpn-prof\n!\n!--- BGP Config ---\nrouter bgp\
      \ $AutonomousSystemNumber\nbgp log-neighbor-changes\n!\naddress-family ipv4\
      \ vrf dmvpn\n  network $OspfRouterId mask 255.255.255.255\n  #if(${CloudRouterSubnet1})\n\
      \  network $CloudRouterSubnet1 mask $CloudRouterSubnetMask1\n  #end\n  #if(${CloudRouterSubnet2})\n\
      \  network $CloudRouterSubnet2 mask $CloudRouterSubnetMask2\n  #end\n  neighbor\
      \ $BranchRouterTunnelIP remote-as $NeighborBgpASN\n  neighbor $BranchRouterTunnelIP\
      \ fall-over bfd\n  neighbor $BranchRouterTunnelIP activate\nexit-address-family"
    template_tag:
    - id: daff6227-0861-4ec4-bb05-6ac60be01d57
      name: cloud-dmvpn-hub
- configuration_templates:
    template_name: DMVPN Spoke for Branch Router - System Default
    template_description: Dynamic Multipoint VPN Spoke for Branch Router
    project_name: Cloud DayN Templates
    author: SYSTEM
    language: VELOCITY
    composite: false
    software_type: IOS-XE
    custom_params_order: false
    device_types:
    - product_family: Routers
    template_content: "!--- Crypto Config ---\ncrypto keyring keyring-dmvpn\n  local-address\
      \ $TunnelSource\n  pre-shared-key address 0.0.0.0 0.0.0.0 key cisco\n!\ncrypto\
      \ isakmp policy 200\nencr aes\nauthentication pre-share\ngroup 2\nlifetime 28800\n\
      crypto isakmp keepalive 10 10\ncrypto isakmp profile dmvpn\n   keyring keyring-dmvpn\n\
      \   match identity address 0.0.0.0\n   local-address $TunnelSource\n!\ncrypto\
      \ ipsec security-association replay window-size 1024\n!\ncrypto ipsec transform-set\
      \ dmvpn esp-aes esp-sha-hmac\nmode transport\n!\n!\ncrypto ipsec profile dmvpn-prof\n\
      set transform-set dmvpn\n!\n!--- DMVPN Tunnel Config ---\ninterface Loopback0\n\
      ip address $OspfRouterId 255.255.255.255\n!\ninterface Tunnel0\nip address $TunnelIPAddress\
      \ $TunnelSubnetMask\nno ip redirects\nip mtu $mtu\n!\nip nhrp map multicast\
      \ $PublicIPCloudRouter1 !PUBLICIP OF CSR1\nip nhrp map $ActiveCloudRouterTunnelIP\
      \ $PublicIPCloudRouter1\nip nhrp map multicast $PublicIPCloudRouter2 !PUBLICIP\
      \ OF CSR2\nip nhrp map $StandbyCloudRouterTunnelIP $PublicIPCloudRouter2\nip\
      \ nhrp network-id $NetworkId\nip nhrp nhs $ActiveCloudRouterTunnelIP\nip nhrp\
      \ nhs $StandbyCloudRouterTunnelIP\nip tcp adjust-mss 1360\nbfd interval 100\
      \ min_rx 100 multiplier 3\ntunnel source $TunnelSource\ntunnel mode gre multipoint\n\
      tunnel key $TunnelKey\ntunnel protection ipsec profile dmvpn-prof\n!\n!--- BGP\
      \ Config ---\nrouter bgp $AutonomousSystemNumber\nbgp log-neighbor-changes\n\
      neighbor $ActiveCloudRouterTunnelIP remote-as $NeighborBgpASNOfActiveCloudRouter\n\
      neighbor $ActiveCloudRouterTunnelIP fall-over bfd\nneighbor $StandbyCloudRouterTunnelIP\
      \ remote-as $NeighborBgpASNOfStandbyCloudRouter\nneighbor $StandbyCloudRouterTunnelIP\
      \ fall-over bfd\n!\naddress-family ipv4\n  network $OspfRouterId mask 255.255.255.255\n\
      \  neighbor $ActiveCloudRouterTunnelIP activate\n  neighbor $StandbyCloudRouterTunnelIP\
      \ activate\nexit-address-family\n!"
    template_tag:
    - id: be2b266e-bb67-4360-89e8-6375553ef19a
      name: branch-router-dmvpn-spoke
