      \ bfd interval 300 min_rx 300 multiplier 3\n!\n{% endfor %}\n!\nip bgp-community\
      \ new-format\n!\n!\nip prefix-list NRP_DEFAULT seq 5 permit 0.0.0.0/0\nip as-path\
      \ access-list 1 permit ^$\n!\nip community-list standard NRP_REGIONAL_PRIMARY\
      \ permit 720:101\nip community-list standard NRP_REGIONAL_SECONDARY permit 720:102\n\
      ip community-list standard NRP_REGIONAL_TERTIARY permit 720:103\nip community-list\
      \ standard NRP_REGIONAL_LASTRESORT permit 720:104\n!\nip community-list standard\
