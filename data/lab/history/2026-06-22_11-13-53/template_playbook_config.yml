- configuration_templates:
    template_name: sshatago_test_jinja
    project_name: sshatago_test
    author: admin
    language: JINJA
    composite: false
    software_type: IOS
    custom_params_order: false
    device_types:
    - product_family: Switches and Hubs
    template_content: "{% raw %}! === JINJA TEMPLATE FOR TESTING preview_template\
      \ ===\n! Template Name: TEST_JINJA_SWITCH_CONFIG\n! Variables: hostname, domain_name,\
      \ ntp_server, snmp_community, enable_logging, vlan_id, vlan_name, mgmt_ip, mgmt_mask\n\
      !\nhostname {{hostname}}\nip domain-name {{domain_name}}\n!\nservice timestamps\
      \ debug datetime msec\nservice timestamps log datetime msec\nservice password-encryption\n\
      !\nntp server {{ntp_server}}\n!\nsnmp-server community {{snmp_community}} RO\n\
      snmp-server location Floor-1\nsnmp-server contact netops@company.com\n!\n{%\
      \ if enable_logging == \"true\" %}\nlogging buffered 16384\nlogging console\
      \ warnings\nlogging monitor informational\nlogging host 10.10.10.100\nlogging\
      \ host 10.10.10.101\n{% endif %}\n!\ninterface Vlan1\n ip address {{mgmt_ip}}\
      \ {{mgmt_mask}}\n!\nline con 0\n logging synchronous\n exec-timeout 30 0\n!\n\
      end\n{% endraw %}"
- configuration_templates:
    template_name: sshatago_test_velocity
    project_name: sshatago_test
    author: admin
    language: VELOCITY
    composite: false
    software_type: IOS
    custom_params_order: false
    device_types:
    - product_family: Switches and Hubs
    template_content: "! === VELOCITY TEMPLATE FOR TESTING preview_template ===\n\
      ! Template Name: TEST_VELOCITY_SWITCH_CONFIG\n! Variables: hostname, domain_name,\
      \ ntp_server, snmp_community, enable_logging, loopback_ip, loopback_mask\n!\n\
      hostname ${hostname}\nip domain-name ${domain_name}\n!\nservice timestamps debug\
      \ datetime msec\nservice timestamps log datetime msec\n!\nntp server ${ntp_server}\n\
      !\nsnmp-server community ${snmp_community} RO\n!\n#if( $enable_logging == \"\
      true\" )\nlogging buffered 32768\nlogging console warnings\nlogging host 10.10.10.100\n\
      #end\n!\ninterface Loopback0\n description Loopback for Management\n ip address\
      \ ${loopback_ip} ${loopback_mask}\n no shutdown\n!\n#foreach( $port in [1, 2,\
      \ 3, 4] )\ninterface GigabitEthernet1/0/${port}\n description Access Port ${port}\n\
      \ switchport mode access\n switchport access vlan 100\n spanning-tree portfast\n\
      \ no shutdown\n!\n#end\n!\nip access-list standard MGMT_ACCESS\n permit 10.0.0.0\
      \ 0.255.255.255\n permit 172.16.0.0 0.15.255.255\n deny any log\n!\nline con\
      \ 0\n logging synchronous\nline vty 0 4\n transport input ssh\n access-class\
      \ MGMT_ACCESS in\n!\nend\n"
- configuration_templates:
    template_name: Switch PNP Onboarding
    project_name: Onboarding Configuration
    language: JINJA
    composite: false
    software_type: IOS-XE
    custom_params_order: true
    device_types:
    - product_family: Switches and Hubs
    template_content: "{% raw %}! A switch has been onboarded via PNP\n! Only DNAC\
      \ can talk to it via its API\n!\n! Need to provision Loopback0\n! L3 Connections\
      \ to Underlay\n! Have to be careful with my one link\n!\n! Jinja Bug\n! {{ENABLE_PASS}}\n\
      ! {{DOMAIN_NAME}}\n! {{HOSTNAME}}\n! {{System_MTU}}\n! {{CEDGE_DFGW}}\n! {{AGGREGATES}}\n\
      ! {{BGP_NETWORKS}}\n! {{INTFS}}\n! {{DESCS}}\n! {{IPS}}\n! {{PEER_OSPF_ID}}\n\
      ! {{WAN_ASN}}\n! {{CORE_PEER}}\n! {{WANPEERS}}\n! {{BGP_ASN}}\n! {{UPSTREAM_DEVICE}}\n\
      ! {{MAX_VTY}}\n! {{LOOP0_DESC}}\n! {{LO0_IP}}\n! {{INTF_UP_2}}\n! {{UP2_DESC}}\n\
      ! {{UP2_VLAN}}\n! {{UP2_VLAN_DESC}}\n! {{UP2_IP}}\n! {{INTF_UP_1}}\n! {{UP1_DESC}}\n\
      ! {{UP1_IP}}\n! {{P2P_SUBNET_MASK}}\n! {{CORE_VLAN}}\n! {{CORE_VLAN_DESC}}\n\
      ! {{CROSS1_INTF}}\n! {{CROSS2_INTF}}\n! {{CROSS1_DESC}}\n! {{CROSS2_DESC}}\n\
      ! {{PO1_DESC}}\n! {{PO1_IP}}\n! {{DEPLOY_BFD}}\n! {{PNP_VLAN}}\n! {{OOB_SUPPORT}}\n\
      ! {{OOB_IP}}\n! {{OOB_VRF}}\n! {{OOB_MASK}}\n! {{OOB_DFGW}}\n! {{OOB_INTF}}\n\
      !\n{% set MASK_PFX = {\"255.255.255.255\": \"/32\", \"255.255.255.254\": \"\
      /31\", \"255.255.255.252\": \"/30\", \"255.255.255.248\": \"/29\", \"255.255.255.240\"\
      : \"/28\", \"255.255.255.224\": \"/27\", \"255.255.255.192\": \"/26\", \"255.255.255.128\"\
      : \"/25\", \"255.255.255.0\": \"/24\", \"255.255.254.0\": \"/23\", \"255.255.252.0\"\
      : \"/22\", \"255.255.248.0\": \"/21\", \"255.255.2.0\": \"/22\", \"255.255.224.0\"\
      : \"/19\", \"255.255.192.0\": \"/18\", \"255.255.128.0\": \"/17\", \"255.255.0.0\"\
      : \"/16\", \"255.254.0.0\": \"/15\", \"255.252.0.0\": \"/14\", \"255.248.0.0\"\
      : \"/13\", \"255.240.0.0\": \"/12\", \"255.224.0.0\": \"/11\", \"255.192.0.0\"\
      : \"/10\", \"255.128.0.0\": \"/9\", \"255.0.0.0\": \"/8\", \"254.0.0.0\": \"\
      /7\", \"252.0.0.0\": \"/6\", \"248.0.0.0\": \"/5\", \"240.0.0.0\": \"/4\", \"\
      224.0.0.0\": \"/3\", \"192.0.0.0\": \"/2\", \"128.0.0.0\": \"/1\", \"0.0.0.0\"\
      : \"/0\"} %}\n! Upstream Device is a {{UPSTREAM_DEVICE}}\n!\nenable secret {{ENABLE_PASS}}\n\
      !\nline con 0\n logging synchronous\n!\n{% if OOB_SUPPORT == \"Yes\" %}\ninterface\
      \ {{OOB_INTF}}\n description OOB Mgmt\n vrf forwarding {{OOB_VRF}}\n ip address\
      \ {{OOB_IP}} {{OOB_MASK}}\n no shutdown\n!\nip route vrf {{OOB_VRF}} 0.0.0.0\
      \ 0.0.0.0 {{OOB_DFGW}}\n!\n{% endif %}\nhostname {{HOSTNAME}}\nip domain name\
      \ {{DOMAIN_NAME}}\n!\ncrypto key generate rsa general-key modulus 2048\n!\n\
      line vty 0 {{MAX_VTY}}\n transport input ssh\n! login local\n!\n!license boot\
      \ level network-advantage addon dna-advantage\n!\nnetconf-yang\n!\nip multicast-routing\n\
      ip pim ssm default\n!\ninterface Loopback0\n description {{LOOP0_DESC}}\n ip\
      \ address {{LO0_IP}} 255.255.255.255\n ip pim sparse-mode\n!\nip ssh version\
      \ 2\nip ssh source-interface Loopback0\n!\n{% if UPSTREAM_DEVICE == \"cEdge\"\
      \ %}\n! My upstream is a cEdge, I am a Core\ninterface {{INTF_UP_2}}\n description\
      \ {{UP2_DESC}}\n switchport\n switchport mode trunk\n no shutdown\n!\nvlan {{UP2_VLAN}}\n\
      interface Vlan{{UP2_VLAN}}\n no shutdown\n description {{UP2_VLAN_DESC}}\n ip\
      \ address {{UP2_IP}} {{P2P_SUBNET_MASK}}\n{% if DEPLOY_BFD == \"Yes\" %}\n bfd\
      \ interval 300 min_rx 300 multiplier 3\n no bfd echo\n{% endif %}\n!\n! Core\
      \ Crosslinks\n!\nvlan {{CORE_VLAN}}\n!\ninterface range {{CROSS1_INTF}} , {{CROSS2_INTF}}\n\
      \ switchport \n switchport mode trunk\n switchport trunk allowed vlan add {{CORE_VLAN}}\n\
      \ channel-group 1 mode active\n!\ninterface {{CROSS1_INTF}}\n description {{CROSS1_DESC}}\n\
      !\ninterface {{CROSS2_INTF}}\n description {{CROSS2_DESC}}\n!\ninterface port-channel1\n\
      \ no shutdown\n description {{PO1_DESC}}\n switchport \n switchport mode trunk\n\
      \ switchport trunk allowed vlan add {{CORE_VLAN}}\n!\ninterface vlan {{CORE_VLAN}}\n\
      \ description {{CORE_VLAN_DESC}}\n ip address {{PO1_IP}} {{P2P_SUBNET_MASK}}\n\
      \ ip pim sparse-mode\n no shutdown\n!\n!\n! Swing the PNP interface\n!\nevent\
      \ manager applet PNP_INTF_CORRECTION\n event syslog pattern \"%BGP-5-ADJCHANGE:\
      \ neighbor {{PEER_OSPF_ID}} Down\" maxrun 60 ratelimit 300\n  action 001 comment\
      \ Connect to the device.\n  action 002 cli command \"enable\"\n  action 003\
      \ cli command \"configure terminal\"\n  action 010 comment Update the PNP VLAN\
      \ and SVI\n  action 011 cli command \"interface vlan {{PNP_VLAN}}\"\n  action\
      \ 012 cli command \"ip address {{UP1_IP}} {{P2P_SUBNET_MASK}}\"\n{% if DEPLOY_BFD\
      \ == \"Yes\" %}\n  action 013 cli command \"bfd interval 300 min_rx 300 multiplier\
      \ 3\"\n  action 014 cli command \"no bfd echo\"\n{% endif %}\n  action 020 comment\
      \ Move the uplink interface to trunk.\n  action 021 cli command \"default interface\
      \ {{INTF_UP_1}}\"\n  action 022 cli command \"interface {{INTF_UP_1}}\"\n  action\
      \ 023 cli command \"switchport\"\n  action 024 cli command \"description {{UP1_DESC}}\"\
      \n  action 025 cli command \"no shutdown\"\n  action 026 cli command \"switchport\
      \ mode trunk\"\n  action 027 cli command \"switchport trunk allowed vlan add\
      \ {{PNP_VLAN}}\"\n  action 030 comment Enable BFD on the BGP peering.\n    {%\
      \ if DEPLOY_BFD == \"Yes\" %}\n  action 031 cli command \"router bgp {{BGP_ASN}}\"\
      \n  action 032 cli command \"neighbor {{CEDGE_DFGW}} fall-over bfd\"\n    {%\
      \ endif %}\n! Script Cleanup\n  action 900 comment Cleanup script\n  action\
      \ 901 cli command \"no event manager applet PNP_INTF_CORRECTION\"\n  action\
      \ 902 cli command \"exit\"\n  action 903 cli command \"write memory\"\n!\n{%\
      \ else %}\n! My upstream is a SDA Speaker, I am not the Core\ninterface {{INTF_UP_2}}\n\
      \ description {{UP2_DESC}}\n no switchport\n no shutdown\n ip address {{UP2_IP}}\
      \ {{P2P_SUBNET_MASK}}\n ip pim sparse-mode\n{% if DEPLOY_BFD == \"Yes\" %}\n\
      \ bfd interval 300 min_rx 300 multiplier 3\n no bfd echo\n ip ospf bfd\n{% endif\
      \ %}\n ip ospf network point-to-point\n logging event link-status\n load-interval\
      \ 30\n!\n! Swing the PNP interface\n!\nevent manager applet PNP_INTF_CORRECTION\n\
      \ event syslog pattern \"%OSPF-5-ADJCHG: Process 1, Nbr {{PEER_OSPF_ID}} on\
      \ Vlan{{PNP_VLAN}} from FULL to DOWN, Neighbor Down:\" maxrun 60 ratelimit 300\n\
      \  action 001 comment Connect to the device.\n  action 002 cli command \"enable\"\
      \n  action 003 cli command \"configure terminal\"\n  action 010 comment Remove\
      \ the PNP VLAN and SVI\n  action 011 cli command \"no interface vlan {{PNP_VLAN}}\"\
      \n  action 012 cli command \"no vlan {{PNP_VLAN}}\"\n  action 013 cli command\
      \ \"interface vlan 1\"\n  action 014 cli command \"no ip address\"\n  action\
      \ 015 cli command \"ip pim sparse-mode\"\n  action 020 comment Create the uplink\
      \ interface\n  action 021 cli command \"interface {{INTF_UP_1}}\"\n  action\
      \ 022 cli command \"no switchport\"\n  action 023 cli command \"description\
      \ {{UP1_DESC}}\"\n  action 024 cli command \"no shutdown\"\n  action 025 cli\
      \ command \"ip address {{UP1_IP}} {{P2P_SUBNET_MASK}}\"\n{% if DEPLOY_BFD ==\
      \ \"Yes\" %}\n  action 026 cli command \"bfd interval 300 min_rx 300 multiplier\
      \ 3\"\n  action 027 cli command \"no bfd echo\"\n  action 028 cli command \"\
      ip ospf bfd\"\n{% endif %}\n  action 029 cli command \"ip ospf network point-to-point\"\
      \n  action 030 cli command \"logging event link-status\"\n  action 030 cli command\
      \ \"load-interval 30\"\n! Script Cleanup\n  action 900 comment Cleanup script\n\
      \  action 901 cli command \"no event manager applet PNP_INTF_CORRECTION\"\n\
      \  action 902 cli command \"exit\"\n  action 903 cli command \"write memory\"\
      \n!\n{% endif %}\n!\n! Core and Distribution Down Links\n! Adds multiple L3\
      \ Interfaces to a Switch\n!\n{% if INTFS != \"\" %}\n!\n  {% for INTF in INTFS|split(\"\
      ;\") %}\n    {% set looper = loop.index0 %}\ninterface {{INTF}}\n    {% for\
      \ DESC in DESCS|split(\";\") %}\n      {% if loop.index0 == looper %}\n description\
      \ {{DESC}}\n      {% endif %}\n    {% endfor %}\n no shutdown\n no switchport\n\
      \ ip pim sparse-mode\n    {% for IP in IPS|split(\";\") %}\n      {% if loop.index0\
      \ == looper %}\n        {% set ADDR = IP.split(\"/\")[0] %}\n        {% set\
      \ BITS = \"/\" + IP.split(\"/\")[1] %}\n        {% for mask, cidr in MASK_PFX.items()\
      \ %}\n          {% if cidr == BITS %}\n            {% set output_mask = mask\
      \ %}\n ip address {{ADDR}} {{output_mask}}\n          {% endif %}\n        {%\
      \ endfor %}\n      {% endif %}\n    {% endfor %}\n!\n  {% endfor %}\n{% endif\
      \ %}\n!\n! All uses\n!\nip routing\nsystem mtu {{System_MTU}}\n!\nrouter ospf\
      \ 1\n router-id {{LO0_IP}}\n network 0.0.0.0 255.255.255.255 area 0\n{% if UPSTREAM_DEVICE\
      \ == \"cEdge\" %}\n default-information originate\n!\nip bgp-community new-format\n\
      !\nrouter bgp {{BGP_ASN}}\n bgp router-id {{LO0_IP}}\n network {{LO0_IP}} mask\
      \ 255.255.255.255\n {% if BGP_NETWORKS != \"\" %}\n  {% for IP in BGP_NETWORKS|split(\"\
      ;\") %}\n    {% if loop.index0 == looper %}\n      {% set ADDR = IP.split(\"\
      /\")[0] %}\n      {% set BITS = \"/\" + IP.split(\"/\")[1] %}\n      {% for\
