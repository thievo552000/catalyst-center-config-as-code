- configuration_templates:
    template_name: Configure COR-COR with MACsec
    project_name: Citi Jinja v21.2.1
    author: admin
    language: JINJA
    composite: false
    software_type: IOS-XE
    custom_params_order: true
    device_types:
    - product_family: Switches and Hubs
      product_series: Cisco Catalyst 9500 Series Switches
    - product_family: Switches and Hubs
      product_series: Cisco Catalyst 9300 Series Switches
    - product_family: Switches and Hubs
      product_series: Cisco Catalyst 9200 Series Switches
    template_content: "{% raw %}!\n! This template adds the Cisco TrustSec configuration\n\
      ! with SGT propagation to the physical interface\n! for the COR-COR HQ/COB Scenario\n\
      !\n{% for INTF in INTERFACES %}\ninterface {{INTF}}\n cts manual\n! @start-ignore-compliance\n\
      \  sap pmk {{PMK}} mode-list gcm-encrypt\n! @end-ingore-compliance\n!\n{% endfor\
      \ %}\n! Jinja bugs\nline con 0\n logging synchronous\n!\n{% endraw %}"
