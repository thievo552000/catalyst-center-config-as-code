- configuration_templates:
    template_name: PnP-Upstream-AP
    project_name: Onboarding Configuration
    author: admin
    language: JINJA
    composite: false
    software_type: IOS-XE
    custom_params_order: false
    device_types:
    - product_family: Switches and Hubs
      product_series: Cisco Catalyst 9500 Series Switches
    - product_family: Switches and Hubs
      product_series: Cisco Catalyst 9300 Series Switches
    template_content: "{% raw %}\n{% set PNP_INTF_PREFIX = \"204.1.216\" %}\n{% set\
      \ PNP_INTF_SUBNET = \"255.255.255.192\" %}\n{% set PNP_INTF_OCT = (PNP_VLAN_ID\
      \ - 2160) * 64 %}\n{% set PNP_INTF_NW = PNP_INTF_PREFIX + \".\" + PNP_INTF_OCT\
      \ %}\n{% set PNP_GW_IP = PNP_INTF_OCT + 1 %}\n{% set PNP_INTF_GW = \"204.1.216.\"\
      \ + PNP_GW_IP %}\n\nvlan {{ PNP_VLAN_ID }}\n\npnp startup-vlan {{ PNP_VLAN_ID\
      \ }}\n\ninterface vlan {{ PNP_VLAN_ID }}\n  ip address {{ PNP_INTF_GW }} {{\
      \ PNP_INTF_SUBNET }}\n  no ip redirects\n  no ip proxy-arp\n  ip pim sparse-mode\n\
      \  ip router isis 1\n  load-interval 30\n  bfd interval 750 min_rx 750 multiplier\
      \ 3\n  no bfd echo\n\nip dhcp pool pnp_vlan_{{ PNP_VLAN_ID }}\n  network {{\
      \ PNP_INTF_NW }} {{ PNP_INTF_SUBNET }}\n  default-router {{ PNP_INTF_GW }}\n\
      \  option 43 ascii \"5A1N;B2;K4;I{{ DNAC_ENT_IP }};J80\"\n\n{% set DESCRIPTION\
      \ = 'AP PnP devices' %}\n{% for INTERFACE in PNP_SW_INTERFACES %}\ninterface\
      \ {{ INTERFACE }}\n  shutdown\n\ndefault interface {{ INTERFACE }}\n\ninterface\
      \ {{ INTERFACE }}\n  description {{ DESCRIPTION }}\n  switchport mode access\n\
      \  switchport access vlan {{ PNP_VLAN_ID }}\n  no shutdown\n\n{% endfor %}\n\
      {% endraw %}"
