      product_series: Cisco Catalyst 9500 Series Switches
    - product_family: Switches and Hubs
      product_series: Cisco Catalyst 9300 Series Switches
    template_content: "{% raw %}\nno logging console\nno logging monitor\n!\nip routing\n\
      !\n!\n!\n!\n!\nip multicast-routing\nip domain name cisco.local\nno ip dhcp\
      \ conflict logging\n!\n!\n!\nno login on-success log\nipv6 unicast-routing\n\
      !\n!\n!\n!\n!\n!\n!\nvtp mode transparent\nno device-tracking logging theft\n\
      !\n!\nsystem mtu 9100\nlicense boot level network-advantage addon dna-advantage\n\
      !\n!\ndiagnostic bootup level minimal\n!\nspanning-tree mode rapid-pvst\nspanning-tree\
      \ extend system-id\narchive\nlog config\n  logging enable\n  logging size 1000\n\
      memory free low-watermark processor 134344\n!\nredundancy\nmode sso\n!\n!\n\
      !\n!\n!\ntransceiver type all\nmonitoring\n!\n!\ninterface vlan {{ PNP_VLAN_ID\
      \ }}\n  no ip redirects\n  no ip proxy-arp\n  ip pim sparse-mode\n  ip router\
      \ isis 1\n  load-interval 30\n  bfd interval 750 min_rx 750 multiplier 3\n \
      \ no bfd echo\n!\ninterface Loopback0\n  ip address {{ LOOPBACK_IP }} 255.255.255.255\n\
      \  ip router isis 1\n!\n!\n\n{% set RANDOM = range(1, 1000) | random %}\n{%\
      \ set ISIS_NET = PNP_VLAN_ID + RANDOM %}\n\nrouter isis 1\n  net 49.0001.1111.1111.{{\
      \ ISIS_NET }}.00\n  is-type level-2-only\n  metric-style wide\n  log-adjacency-changes\n\
      \  bfd all-interfaces\n!\nip forward-protocol nd\n!\nnetconf-yang\nend\n{% endraw\
      \ %}"
- configuration_templates:
    template_name: PnP-Devices_SF-EWLC_No-Vars
    project_name: Onboarding Configuration
    author: admin
    language: JINJA
    composite: false
    software_type: IOS-XE
    custom_params_order: false
    device_types:
